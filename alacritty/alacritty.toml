[env]
TERM = "xterm-256color"

[window]
dynamic_padding = true
decorations = "none"
opacity = 0.82
decorations_theme_variant = "Dark"

[window.padding]
x = 18
y = 14

[scrolling]
history = 10000
multiplier = 3

[colors.primary]
background = "#282828"
foreground = "#ebdbb2"

[colors.normal]
black = "#32302f"
red = "#cc241d"
green = "#98971a"
yellow = "#d79921"
blue = "#458588"
magenta = "#b16286"
cyan = "#689d6a"
white = "#a89984"

[colors.bright]
black = "#928374"
red = "#fb4934"
green = "#b8bb26"
yellow = "#fabd2f"
blue = "#83a598"
magenta = "#d3869b"
cyan = "#8ec07c"
white = "#ebdbb2"

[colors.selection]
background = "#ebdbb2"
text = "#282828"

[colors.cursor]
cursor = "#fabd2f"
text   = "#282828"

[colors.vi_mode_cursor]
cursor = "#fabd2f"
text   = "#282828"

[font]
size = 12.0

[font.normal]
family = "Maple Mono NF"
style = "Regular"

[font.bold]
family = "Maple Mono NF"
style = "Bold"

[font.italic]
family = "Maple Mono NF"
style = "Italic"

[cursor]
style = { shape = "Beam", blinking = "On" }
thickness = 0.15

[mouse]
hide_when_typing = true

[selection]
save_to_clipboard = true

[general]
live_config_reload = true
