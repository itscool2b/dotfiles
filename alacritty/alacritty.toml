[env]
TERM = "xterm-256color"

[window]
dynamic_padding = true
decorations = "none"
opacity = 0.82
decorations_theme_variant = "Dark"

[window.padding]
x = 36
y = 28

[scrolling]
history = 10000
multiplier = 3

[colors.primary]
background = "#2a2724"
foreground = "#d4be98"

[colors.normal]
black = "#322f2c"
red = "#ea6962"
green = "#a9b665"
yellow = "#d8a657"
blue = "#7daea3"
magenta = "#d3869b"
cyan = "#89b482"
white = "#a89984"

[colors.bright]
black = "#928374"
red = "#ea6962"
green = "#a9b665"
yellow = "#d8a657"
blue = "#7daea3"
magenta = "#d3869b"
cyan = "#89b482"
white = "#d4be98"

[colors.selection]
background = "#d4be98"
text = "#2a2724"

[colors.cursor]
cursor = "#d8a657"
text   = "#2a2724"

[colors.vi_mode_cursor]
cursor = "#d8a657"
text   = "#2a2724"

[font]
size = 13.0

[font.normal]
family = "Maple Mono NF"
style = "Regular"

[font.bold]
family = "Maple Mono NF"
style = "Bold"

[font.italic]
family = "Maple Mono NF"
style = "Italic"

[cursor]
style = { shape = "Beam", blinking = "On" }
thickness = 0.15

[mouse]
hide_when_typing = true

[selection]
save_to_clipboard = true

[general]
live_config_reload = true
