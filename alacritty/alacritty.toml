[env]
TERM = "xterm-256color"

[window]
dynamic_padding = true
decorations = "none"
opacity = 0.85
decorations_theme_variant = "Dark"

[window.padding]
x = 18
y = 14

[scrolling]
history = 10000
multiplier = 3

[colors.primary]
background = "#181818"
foreground = "#e8e8e8"

[colors.normal]
black = "#212121"
red = "#7d4d4d"
green = "#4d7d4d"
yellow = "#7d7d4d"
blue = "#4d6580"
magenta = "#4d6d80"
cyan = "#4d807d"
white = "#808080"

[colors.bright]
black = "#686868"
red = "#b08080"
green = "#80b080"
yellow = "#b0b080"
blue = "#80a0b8"
magenta = "#80a8b8"
cyan = "#80b8a8"
white = "#e8e8e8"

[colors.selection]
background = "#e8e8e8"
text = "#181818"

[font]
size = 12.0

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[cursor]
style = { shape = "Beam", blinking = "On" }
thickness = 0.15

[mouse]
hide_when_typing = true

[selection]
save_to_clipboard = true

[general]
live_config_reload = true
