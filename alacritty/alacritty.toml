[env]
TERM = "xterm-256color"

[window]
dynamic_padding = true
decorations = "none"
opacity = 0.82
decorations_theme_variant = "Dark"

[window.padding]
x = 18
y = 14

[scrolling]
history = 10000
multiplier = 3

[colors.primary]
background = "#22272e"
foreground = "#c9d1d9"

[colors.normal]
black = "#2c323b"
red = "#c0526a"
green = "#56b66a"
yellow = "#c49a3a"
blue = "#4a8fd1"
magenta = "#8258d8"
cyan = "#2eadb6"
white = "#8b949e"

[colors.bright]
black = "#768390"
red = "#ff7b72"
green = "#7ee787"
yellow = "#d29922"
blue = "#6b8fb8"
magenta = "#a371f7"
cyan = "#8aa8c8"
white = "#c9d1d9"

[colors.selection]
background = "#c9d1d9"
text = "#22272e"

[font]
size = 12.0

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[cursor]
style = { shape = "Beam", blinking = "On" }
thickness = 0.15

[mouse]
hide_when_typing = true

[selection]
save_to_clipboard = true

[general]
live_config_reload = true
