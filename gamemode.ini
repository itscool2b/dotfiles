[general]
renice=10
ioprio=0
inhibit_screensaver=1
softrealtime=auto

[gpu]
apply_gpu_optimisations=accept-responsibility
gpu_device=0
nv_powermizer_mode=1

[custom]
start=notify-send -a GameMode "GameMode" "On — GPU pinned to max perf"
end=notify-send -a GameMode "GameMode" "Off — GPU back to adaptive"
