# OLED burn-in protection — MSI MPG 321URX QD-OLED
# Tightened idle timers to minimize static-content exposure.
# Monitor's own pixel-shift / panel-refresh features (set in OSD) handle pixel-level wear.

general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
}

# Lock screen after 5 min idle
listener {
    timeout = 300
    on-timeout = hyprlock
}

# Power the panel off after 8 min idle — pixels at zero current = no wear
listener {
    timeout = 480
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}
