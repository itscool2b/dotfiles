# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  Hyprland Config — CachyOS — Gruvbox Dark
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

monitor=DP-1,3840x2160@239.99,0x0,1.5

$terminal    = kitty
$fileManager = kitty --class yazi -e yazi
$browser     = google-chrome-stable --force-dark-mode --enable-features=WebUIDarkMode
$menu        = rofi -show drun

exec-once = blueman-applet &
exec-once = waybar &
exec-once = ~/.config/hypr/scripts/waybar-autohide.sh &  # OLED: hide bar until cursor hits top edge
exec-once = swaync &
exec-once = nm-applet &
exec-once = awww-daemon && sleep 1 && awww img /home/itscool2b/.config/wallpapers/wallhaven-k9rqp7.jpg --transition-type grow --transition-pos center --transition-duration 1.5 --transition-fps 240
exec-once = wl-paste --type text --watch cliphist store &
exec-once = wl-paste --type image --watch cliphist store &
exec-once = hypridle &  # OLED burn-in protection: idle lock + DPMS off
exec-once = swayosd-server &
exec-once = hyprpm reload -n

# ━━━ Qt theming — make Dolphin & other Qt6 apps read kdeglobals + ~/.local/share/color-schemes/ ━━━
env = QT_QPA_PLATFORMTHEME,kde
env = QT_QPA_PLATFORM,wayland;xcb

# ━━━ NVIDIA Wayland gaming hints (per Hyprland NVIDIA wiki) ━━━
env = __GL_VRR_ALLOWED,1
env = __GL_GSYNC_ALLOWED,1
env = AQ_FORCE_LINEAR_BLIT,0

# ━━━ NVIDIA + Wayland app/game compatibility ━━━
env = LIBVA_DRIVER_NAME,nvidia               # hardware video decode (Telegram/Chrome/mpv/OBS)
env = __GLX_VENDOR_LIBRARY_NAME,nvidia       # force NVIDIA GLX path for Xwayland clients
env = NVD_BACKEND,direct                     # NVENC/NVDEC direct backend
env = GBM_BACKEND,nvidia-drm                 # NVIDIA GBM (driver 555+ handles cleanly; required by some apps)
env = ELECTRON_OZONE_PLATFORM_HINT,auto      # Discord/VSCode/Slack pick Wayland with safe X11 fallback
env = MOZ_ENABLE_WAYLAND,1                   # Firefox native Wayland
env = GSK_RENDERER,ngl                       # GTK4 NVIDIA-native renderer (faster on 4K)
env = __GL_MaxFramesAllowed,1                # cap pre-rendered frames; lowers input latency
env = PROTON_ENABLE_NGX_UPDATER,1            # Proton fetches DLSS/NGX components

# ━━━ SDL Wayland fractional-scale fix ━━━
# At 1.5x desktop scale, SDL's Wayland backend miscalculates available game resolutions
# (e.g. CS2 lists 1067x600 instead of 3840x2160). NVIDIA dev forum confirms this var is the canonical fix.
env = SDL_VIDEO_WAYLAND_SCALE_TO_DISPLAY,1

# ━━━ Steam UI scale ━━━
# New Steam UI removed the percentage dropdown. With xwayland:force_zero_scaling=true,
# Xwayland reports scale 1.0 to Steam, so Steam renders at 100% (tiny on 4K). Force 1.5x to match desktop.
env = STEAM_FORCE_DESKTOPUI_SCALING,1.5

# ━━━ Desktop session hints (helps a few Qt/Electron apps that misdetect) ━━━
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland

# ━━━ NVIDIA hardware cursor fix (fixes cursor position drift in Xwayland apps/games) ━━━
cursor {
    no_hardware_cursors = true
}

# ━━━ Xwayland: render at native resolution, no upscale blur ━━━
# Steam, Discord-legacy, older games — all draw at true 4K instead of 2560x1440-then-upscaled.
# After enabling: set Steam → Settings → Interface → Scale to 150% so its UI matches the desktop.
xwayland {
    force_zero_scaling = true
}

# ━━━ Visual theme (generated from theme.toml) ━━━
source = ~/.config/hypr/theme.conf
source = ~/.config/hypr/plugins.conf

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

# ━━━ Functional override (not theming) — required for the `immediate` windowrule on games to actually tear past vsync. ━━━
# Tearing only kicks in for windows that have the `immediate` rule applied (steam_app_*, fullscreen X11),
# so the desktop and other apps stay vsync'd. Lives here, not in theme.conf, because it's a compatibility setting.
general {
    allow_tearing = true
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    # vrr=2 (fullscreen-only) — Hyprland-recommended for OLED to avoid
    # gamma flicker on dark/static content (per Hyprland FAQ). Do not change.
    vrr = 2
    # Keep games rendering at 60 fps when their workspace isn't visible, so X11 fullscreen
    # games don't lose their GL/Vulkan context on workspace switch (paired with `render_unfocused on` per-window rule).
    render_unfocused_fps = 60
}

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat
    repeat_rate = 35
    repeat_delay = 200
}

device {
    name = logitech-g-pro--1
    sensitivity = 0
    accel_profile = flat
}

$mainMod = SUPER

bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, B, exec, $browser
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, F, fullscreen, 0
bind = $mainMod SHIFT, F, fullscreen, 1
bind = $mainMod, P, pseudo,

bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = SHIFT, Print, exec, grim - | wl-copy
bind = $mainMod, Print, exec, grim -g "$(slurp)" ~/Pictures/$(date +'%Y%m%d_%H%M%S').png
bind = $mainMod, C, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, j, movewindow, d

bind = $mainMod CTRL, h, resizeactive, -40 0
bind = $mainMod CTRL, l, resizeactive, 40 0
bind = $mainMod CTRL, k, resizeactive, 0 -40
bind = $mainMod CTRL, j, resizeactive, 0 40

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Volume / brightness: prefer swayosd-client (shows OSD popup); fall back to wpctl/brightnessctl if not installed
bindel = , XF86AudioRaiseVolume, exec, sh -c 'swayosd-client --output-volume raise 2>/dev/null || wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+'
bindel = , XF86AudioLowerVolume, exec, sh -c 'swayosd-client --output-volume lower 2>/dev/null || wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-'
bindel = , XF86AudioMute,        exec, sh -c 'swayosd-client --output-volume mute-toggle 2>/dev/null || wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle'
bindel = , XF86AudioMicMute,     exec, sh -c 'swayosd-client --input-volume mute-toggle 2>/dev/null || wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle'
bindel = , XF86MonBrightnessUp,   exec, sh -c 'swayosd-client --brightness raise 2>/dev/null || brightnessctl s +5%'
bindel = , XF86MonBrightnessDown, exec, sh -c 'swayosd-client --brightness lower 2>/dev/null || brightnessctl s 5%-'
# Caps-lock / num-lock OSD handled by swayosd-libinput-backend.service (system unit, enable after install)
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

bind = $mainMod SHIFT, X, exec, hyprlock
bind = $mainMod SHIFT, C, exec, hyprpicker -a
# Use `exec` so Hyprland doesn't validate this plugin dispatcher before hyprpm loads hyprexpo.
bind = $mainMod, Tab, exec, hyprctl dispatch hyprexpo:expo toggle

# ━━━ Layer rules — blur behind overlays ━━━
layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0.3, match:namespace waybar
layerrule = blur on, match:namespace rofi
layerrule = ignore_alpha 0.3, match:namespace rofi
layerrule = blur on, match:namespace swaync-control-center
layerrule = blur on, match:namespace swaync-notification-window
layerrule = ignore_alpha 0.3, match:namespace swaync-control-center
layerrule = ignore_alpha 0.3, match:namespace swaync-notification-window

# ━━━ Window rules ━━━

# Suppress maximize globally (existing).
windowrule {
    name = suppress-maximize
    match:class = .*
    suppress_event = maximize
}

# ─── Root-level: every Xwayland window keeps rendering when its workspace isn't visible. ───
# X11 clients (games, Wine, RetroArch, legacy apps) can crash on Wayland workspace unmap because they
# hold a GL/Vulkan context tied to a surface that just got unmapped. render_unfocused tells Hyprland to
# keep "rendering" them at misc.render_unfocused_fps (60), which keeps the surface alive. Cost on idle
# X11 windows is near-zero (they only render if they have new content). Fixes symptom D universally —
# Steam, Lutris, Heroic, native binaries, anything via Xwayland.
windowrule {
    name = xwayland-stability
    match:xwayland = true
    render_unfocused = yes
}

# ─── Root-level: any fullscreen content (Wayland or X11) prevents idle/DPMS. ───
# Replaces a per-game `idleinhibit` rule with one matching on the actual property: fullscreen state.
windowrule {
    name = fullscreen-stay-awake
    match:fullscreen = true
    idle_inhibit = fullscreen
}

# ─── Root-level: X11 fullscreen game stability. ───
# no_vrr: with misc.vrr=2 (fullscreen-only), every game-fullscreen-enter triggers a NVIDIA DRM mode-switch
#         that renders as a fade-to-black on this driver. Disabling VRR per-window for X11 fullscreen
#         (i.e. all games) keeps them visible. Trade-off: no G-Sync in games. Visible > G-Sync.
# immediate: tearing for low-latency present (X11 doesn't use Wayland presentation-time protocol).
windowrule {
    name = x11-fullscreen-stability
    match:fullscreen = true
    match:xwayland = true
    no_vrr = yes
    immediate = yes
}

# ─── Steam game class — game-specific anti-stall (open/close anim suppression). ───
# This is the only Steam-specific stability rule remaining. no_anim/no_dim are kept here (not pushed to
# all Xwayland) because we don't want to suppress animations for every X11 utility — only games, where
# the open animation can stall the first present and cause invisible-on-launch.
windowrule {
    name = steam-games-no-anim-stall
    match:class = ^(steam_app_)
    no_anim = yes
    no_dim = yes
}

# ─── Steam helper-window note ───
# DX12/VKD3D games (Forza etc.) spawn a second untitled fullscreen `steam_app_*` window as a swapchain
# reference. Hiding/moving/suppressing-fullscreen on this window crashes the game — the helper isn't
# ornamental, the renderer NEEDS it where it is. Workaround if it engulfs the screen on alt-tab: move
# it manually with Super+left-drag, or just close and relaunch the game. Don't add a rule here.

# ─── Steam main client — intentional UX placement (not stability) ───
windowrule {
    name = steam-main-workspace
    match:class = ^(steam)$
    workspace = 4 silent
}
windowrule {
    name = steam-friends-float
    match:title = ^(Friends List)$
    float = yes
}
windowrule {
    name = steam-news-float
    match:title = ^(Steam - News)$
    float = yes
}
windowrule {
    name = steam-settings-float
    match:title = ^(Steam Settings)$
    float = yes
}

# ─── Telegram (running under Xwayland via ~/.local/share/applications override) ───
# Belt-and-suspenders: even under Xwayland, opt out of VRR engagement on its image viewer's
# fullscreen state changes so NVIDIA doesn't do a DRM mode-switch + blank.
# (no_vrr only takes effect when misc.vrr is 2 or 3, which it is.)
windowrule {
    name = telegram-no-vrr
    match:class = ^(TelegramDesktop)$
    no_vrr = yes
}
