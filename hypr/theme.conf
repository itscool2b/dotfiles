# ━━━ Hyprland Theme — Quiet Editorial ━━━
# Generated from theme.toml — do not edit directly

env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Bibata-Modern-Classic

general {
    gaps_in = 6
    gaps_out = 16
    border_size = 1
    col.active_border = rgba(d8a657ff) 
    col.inactive_border = rgba(28282800)
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 6

    active_opacity = 1.0
    inactive_opacity = 0.92

    shadow {
        enabled = true
        range = 22
        render_power = 3
        color = rgba(1d202199)
        offset = 0 4
        scale = 0.96
    }

    blur {
        enabled = true
        size = 14
        passes = 3
        noise = 0.01
        contrast = 1.0
        brightness = 0.88
        vibrancy = 0.25
        vibrancy_darkness = 0.5
        new_optimizations = true
        xray = false
        popups = true
    }
}

animations {
    enabled = true

    bezier = liner, 1.0, 1.0, 1.0, 1.0
    bezier = smooth, 0.25, 1.0, 0.5, 1.0
    bezier = snappy, 0.22, 1.0, 0.36, 1.0
    bezier = soft, 0.25, 0.46, 0.45, 0.94

    animation = windows, 1, 3, snappy, slide
    animation = windowsIn, 1, 3, snappy, slide
    animation = windowsOut, 1, 2, soft, slide
    animation = windowsMove, 1, 4, smooth
    animation = fade, 1, 4, liner
    animation = workspaces, 1, 3, snappy, slidefade 15%
    animation = layers, 1, 3, soft, fade
    animation = layersIn, 1, 3, soft, fade
    animation = layersOut, 1, 2, soft, fade
    animation = border, 1, 10, liner
    animation = borderangle, 1, 120, liner, loop
}

# ━━━ Per-layer polish: custom entrance animations ━━━
layerrule = animation slide, match:namespace waybar
layerrule = animation popin 80%, match:namespace rofi
layerrule = animation slide, match:namespace swaync-control-center
layerrule = animation slide, match:namespace swaync-notification-window
