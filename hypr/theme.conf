# ━━━ Hyprland Theme — Gruvbox Blue ━━━
# Generated from theme.toml — do not edit directly

env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Bibata-Modern-Classic

general {
    gaps_in = 6
    gaps_out = 16
    border_size = 1
    col.active_border = rgba(83a598ff) 
    col.inactive_border = rgba(32302f00)
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 8

    active_opacity = 1.0
    inactive_opacity = 0.92

    shadow {
        enabled = true
        range = 22
        render_power = 3
        color = rgba(28282899)
        offset = 0 4
        scale = 0.96
    }

    blur {
        enabled = true
        size = 14
        passes = 3
        noise = 0.01
        contrast = 1.0
        brightness = 0.88
        vibrancy = 0.25
        vibrancy_darkness = 0.5
        new_optimizations = true
        xray = false
        popups = true
    }
}

animations {
    enabled = true

    bezier = emphasized, 0.2, 0.0, 0.0, 1.0
    bezier = emphasized_decel, 0.05, 0.7, 0.1, 1.0
    bezier = emphasized_accel, 0.3, 0.0, 0.8, 0.15
    bezier = liner, 1.0, 1.0, 1.0, 1.0

    animation = windows, 1, 5, emphasized_decel, popin 80%
    animation = windowsIn, 1, 5, emphasized_decel, popin 85%
    animation = windowsOut, 1, 4, emphasized_accel, popin 90%
    animation = windowsMove, 1, 5, emphasized
    animation = fade, 1, 4, emphasized
    animation = workspaces, 1, 6, emphasized, slidefade 20%
    animation = layers, 1, 4, emphasized_decel, slide
    animation = layersIn, 1, 4, emphasized_decel, slide
    animation = layersOut, 1, 3, emphasized_accel, fade
    animation = border, 1, 12, emphasized
    animation = borderangle, 1, 120, liner, loop
}

# ━━━ Per-layer polish: custom entrance animations ━━━
layerrule = animation slide, match:namespace waybar
layerrule = animation slidefade 15%, match:namespace rofi
layerrule = animation slide, match:namespace swaync-control-center
layerrule = animation slide, match:namespace swaync-notification-window
