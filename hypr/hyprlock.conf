general {
    grace = 5
    hide_cursor = true
}

background {
    monitor =
    path = /home/itscool2b/.config/wallpapers/wallpaper.png
    blur_passes = 4
    blur_size = 10
    noise = 0.02
    contrast = 0.8
    brightness = 0.6
    vibrancy = 0.15
}

label {
    monitor =
    text = $TIME
    color = rgba(ebdbb2ff)
    font_size = 96
    font_family = JetBrainsMono Nerd Font
    position = 0, 160
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(1d202199)
}

label {
    monitor =
    text = cmd[update:3600000] date +"%A, %B %d"
    color = rgba(a89984ff)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 70
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 320, 50
    outline_thickness = 3
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgba(d79921ff)
    inner_color = rgba(28282899)
    font_color = rgba(ebdbb2ff)
    fade_on_empty = true
    placeholder_text = <span foreground="##a89984">  Password...</span>
    hide_input = false
    rounding = 14
    check_color = rgba(b8bb26ff)
    fail_color = rgba(fb4934ff)
    fail_text = <span foreground="##fb4934">  $FAIL</span>
    position = 0, -40
    halign = center
    valign = center
    shadow_passes = 2
}
