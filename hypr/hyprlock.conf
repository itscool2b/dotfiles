general {
    grace = 5
    hide_cursor = true
}

background {
    monitor =
    path = /home/itscool2b/.config/wallpapers/wallpaper.png
    blur_passes = 5
    blur_size = 12
    noise = 0.01
    contrast = 0.7
    brightness = 0.5
    vibrancy = 0.15
}

label {
    monitor =
    text = $TIME
    color = rgba(c9d1d9ff)
    font_size = 96
    font_family = JetBrainsMono Nerd Font
    position = 0, 160
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(22272e99)
}

label {
    monitor =
    text = cmd[update:3600000] date +"%A, %B %d"
    color = rgba(8b949eff)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 70
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 320, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgba(c49a3aff)
    inner_color = rgba(2c323b99)
    font_color = rgba(c9d1d9ff)
    fade_on_empty = true
    placeholder_text = <span foreground="##8b949e">  Password...</span>
    hide_input = false
    rounding = 14
    check_color = rgba(7ee787ff)
    fail_color = rgba(ff7b72ff)
    fail_text = <span foreground="##ff7b72">  $FAIL</span>
    position = 0, -40
    halign = center
    valign = center
    shadow_passes = 2
}
