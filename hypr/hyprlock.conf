general {
    grace = 5
    hide_cursor = true
}

background {
    monitor =
    path = /home/itscool2b/.config/wallpapers/wallpaper.png
    blur_passes = 5
    blur_size = 12
    noise = 0.01
    contrast = 0.7
    brightness = 0.5
    vibrancy = 0.15
}

label {
    monitor =
    text = $TIME
    color = rgba(d4be98ff)
    font_size = 96
    font_family = JetBrainsMono Nerd Font
    position = 0, 160
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(1d202199)
}

label {
    monitor =
    text = cmd[update:3600000] date +"%A, %B %d"
    color = rgba(928374ff)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 70
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 320, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgba(d8a657ff)
    inner_color = rgba(28282899)
    font_color = rgba(d4be98ff)
    fade_on_empty = true
    placeholder_text = <span foreground="##928374">  Password...</span>
    hide_input = false
    rounding = 14
    check_color = rgba(b0b846ff)
    fail_color = rgba(f2594bff)
    fail_text = <span foreground="##f2594b">  $FAIL</span>
    position = 0, -40
    halign = center
    valign = center
    shadow_passes = 2
}
