# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  Hyprland Plugins — generated from theme.toml
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

plugin {

    hyprexpo {
        columns = 3
        gap_size = 5
        bg_col = rgb(1d2021)
        workspace_method = center current
        skip_empty = false
        # Gestures disabled — trigger overview via the hyprexpo:expo dispatcher instead.
        enable_gesture = false
    }





    hyprfocus {
        enabled = yes
        animate_floating = yes
        animate_workspacechange = yes
        focus_animation = shrink

        bezier {
            name = focus-in
            x0 = 0.22
            y0 = 1.0
            x1 = 0.36
            y1 = 1.0
        }

        flash {
            flash_opacity = 0.95
            in_bezier = focus-in
            in_speed = 0.4
            out_bezier = focus-in
            out_speed = 4
        }

        shrink {
            shrink_percentage = 0.94
            in_bezier = focus-in
            in_speed = 0.4
            out_bezier = focus-in
            out_speed = 4
        }
    }

}
