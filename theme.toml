# ~/.config/theme.toml — Single source of truth for all visual settings
# Change values here, then run: ./theme-generate.py

[meta]
name = "Midnight Glass"

# ════════════════════════════════════════════
#  COLORS — Blackish blue-tinted base + blue hero
# ════════════════════════════════════════════

[colors]
# Backgrounds (grayer, cool blue undertone)
bg0      = "#22272e"
bg1      = "#2c323b"
bg2      = "#363d48"
bg3      = "#424a56"
bg4      = "#525c6b"
gray     = "#768390"

# Foregrounds (cool cream)
fg       = "#c9d1d9"
fg_dim   = "#8b949e"
fg_light = "#f0f6fc"

# Normal ANSI
red      = "#c0526a"
green    = "#56b66a"
yellow   = "#c49a3a"
blue     = "#4a8fd1"
purple   = "#8258d8"
cyan     = "#2eadb6"
orange   = "#d06a2e"

# Bright ANSI (blue = hero, pale-blue secondary)
bright_red     = "#ff7b72"
bright_green   = "#7ee787"
bright_yellow  = "#d29922"
bright_blue    = "#6b8fb8"
bright_purple  = "#a371f7"
bright_cyan    = "#8aa8c8"
bright_orange  = "#f0883e"

# ════════════════════════════════════════════
#  FONTS
# ════════════════════════════════════════════

[fonts]
mono = "JetBrainsMono Nerd Font"
sans = "Noto Sans"

[fonts.size]
terminal       = 12
bar            = 13
bar_clock      = 14
bar_title      = 12
notification   = 13
dunst          = 11
rofi           = 12
rofi_prompt    = 14
wofi           = 14
gtk            = 10
sddm_time      = 64
sddm_date      = 16
sddm_input     = 14
sddm_greeting  = 13
sddm_label     = 11
sddm_button    = 12
hyprlock_time   = 96
hyprlock_date   = 20

# ════════════════════════════════════════════
#  CURSOR
# ════════════════════════════════════════════

[cursor]
theme              = "Bibata-Modern-Classic"
size               = 24
kitty_shape        = "beam"
kitty_blink        = 0.5
kitty_thickness    = 1.8
kitty_trail        = 3
kitty_trail_decay  = "0.1 0.3"
alacritty_shape    = "Beam"
alacritty_blinking = "On"
alacritty_thickness = 0.15

# ════════════════════════════════════════════
#  ICONS & THEMES
# ════════════════════════════════════════════

[icons]
theme           = "Papirus-Dark"
gtk_theme       = "Breeze"
xsettings_theme = "Breeze-Dark"

# ════════════════════════════════════════════
#  WALLPAPER
# ════════════════════════════════════════════

[wallpaper]
path = "~/.config/wallpapers/wallpaper.png"

# ════════════════════════════════════════════
#  GEOMETRY — Gaps, borders, radii, padding
# ════════════════════════════════════════════

[geometry]
# Hyprland
gaps_in            = 6
gaps_out           = 16
border_size        = 2
rounding           = 12

# Terminal padding
terminal_pad_x     = 18
terminal_pad_y     = 14

# Waybar
bar_height         = 32
bar_margin_top     = 5
bar_margin_side    = 10
bar_radius         = 10
bar_tooltip_radius = 12

# Dunst
dunst_width        = 350
dunst_height       = 100
dunst_offset       = "12x12"
dunst_radius       = 10
dunst_frame_width  = 1
dunst_padding      = 12
dunst_h_padding    = 16
dunst_gap          = 6

# Rofi
rofi_width           = 550
rofi_padding         = 14
rofi_radius          = 24
rofi_inputbar_radius = 16
rofi_inputbar_pad_v  = 10
rofi_inputbar_pad_h  = 16
rofi_element_radius  = 16
rofi_element_pad_v   = 8
rofi_element_pad_h   = 16
rofi_element_spacing = 4
rofi_icon_size       = 24
rofi_lines           = 8

# Wofi
wofi_border        = 1
wofi_radius        = 12
wofi_input_radius  = 8
wofi_entry_radius  = 8

# Swaync
swaync_cc_radius    = 16
swaync_notif_radius = 12
swaync_cc_width     = 400
swaync_notif_width  = 360

# Hyprlock
hyprlock_input_width  = 320
hyprlock_input_height = 50
hyprlock_input_border = 2
hyprlock_input_radius = 14

# SDDM
sddm_login_radius  = 16
sddm_input_radius  = 10
sddm_button_radius = 15

# ════════════════════════════════════════════
#  OPACITY & BLUR — Glass effect
# ════════════════════════════════════════════

[opacity]
terminal         = 0.82
inactive_window  = 0.85
kitty_dim        = 0.75
bar_module_bg    = 0.25
bar_module_hover = 0.12
bar_tooltip      = 0.90
rofi_bg_alpha    = "99"
rofi_glass_input = 5
rofi_glass_sel   = 8
swaync_cc        = 0.60
swaync_notif     = 0.72
sddm_login_box   = 0.72
sddm_overlay     = 0.55

[blur]
hypr_size              = 14
hypr_passes            = 5
hypr_noise             = 0.01
hypr_contrast          = 1.0
hypr_brightness        = 0.88
hypr_vibrancy          = 0.25
hypr_vibrancy_darkness = 0.5
lock_passes            = 5
lock_size              = 12
lock_noise             = 0.01
lock_contrast          = 0.7
lock_brightness        = 0.5
sddm_radius            = 56

# ════════════════════════════════════════════
#  SHADOWS
# ════════════════════════════════════════════

[shadow]
hypr_range        = 35
hypr_render_power = 3
hypr_offset       = "0 6"
hypr_scale        = 0.96
hypr_alpha        = "dd"

# ════════════════════════════════════════════
#  ANIMATIONS
# ════════════════════════════════════════════

[animations]
bar_transition      = "0.2s"
swaync_transition   = 200
sddm_clock_fade     = 800
sddm_box_fade       = 900
sddm_buttons_fade   = 1000

[animations.beziers]
wind   = [0.05, 0.9, 0.1, 1.05]
winIn  = [0.1, 1.1, 0.1, 1.0]
winOut = [0.3, -0.3, 0.0, 1.0]
liner  = [1.0, 1.0, 1.0, 1.0]
smooth = [0.25, 1.0, 0.5, 1.0]

[animations.hyprland]
windows     = [1, 4, "wind", "slide"]
windowsIn   = [1, 4, "winIn", "slide"]
windowsOut  = [1, 3, "winOut", "slide"]
windowsMove = [1, 4, "smooth", ""]
fade        = [1, 4, "liner", ""]
workspaces  = [1, 4, "smooth", "slide"]
layers      = [1, 3, "wind", "fade"]
layersIn    = [1, 3, "winIn", "fade"]
layersOut   = [1, 2, "winOut", "fade"]
border      = [1, 10, "liner", ""]
borderangle = [1, 60, "liner", "loop"]

# ════════════════════════════════════════════
#  BORDER — Subtle muted gradient
# ════════════════════════════════════════════

[border]
active_colors  = ["bright_blue", "bright_cyan"]
active_angle   = "45deg"
inactive_alpha = "00"

# ════════════════════════════════════════════
#  ACCENTS — Per-module color assignments
#  Values reference color names from [colors]
# ════════════════════════════════════════════

[accents.bar]
workspace_active = "bright_blue"
clock            = "fg"
cpu              = "bright_blue"
memory           = "bright_cyan"
audio            = "bright_blue"
network          = "bright_blue"
media            = "bright_cyan"
notification     = "bright_blue"

[accents.fetch]
os       = "bright_blue"
kernel   = "bright_cyan"
packages = "bright_blue"
shell    = "bright_cyan"
uptime   = "bright_blue"
wm       = "bright_blue"
terminal = "bright_cyan"
cpu      = "bright_blue"
gpu      = "bright_blue"
memory   = "bright_cyan"
disk     = "bright_blue"

[accents.starship]
directory   = "bright_blue"
git_branch  = "bright_cyan"
git_status  = "fg_dim"
python      = "bright_blue"
nodejs      = "bright_cyan"
rust        = "bright_blue"

[accents.rofi]
selection = "bright_blue"

[accents.wofi]
focus     = "bright_blue"
selection = "bright_blue"

[accents.btop]
highlight   = "bright_blue"
selected    = "bright_blue"
proc_misc   = "bright_blue"
cpu_box     = "bright_cyan"
mem_box     = "bright_blue"
net_box     = "bright_cyan"
proc_box    = "bright_blue"
download    = "bright_blue"
upload      = "bright_cyan"

[accents.kitty]
url_color = "bright_blue"

[accents.sddm]
login_button = "bright_blue"
