# ~/.config/theme.toml — Single source of truth for all visual settings
# Change values here, then run: ./theme-generate.py

[meta]
name = "Quiet Editorial"

# ════════════════════════════════════════════
#  COLORS — Gruvbox Material palette (softer, smoother than canonical)
# ════════════════════════════════════════════

[colors]
# Backgrounds (warm dark, hard-contrast bg0 retained)
bg0      = "#1d2021"
bg1      = "#282828"
bg2      = "#32302f"
bg3      = "#3c3836"
bg4      = "#504945"
gray     = "#7c6f64"

# Foregrounds (Gruvbox Material soft cream — less yellow than canonical)
fg       = "#d4be98"
fg_dim   = "#928374"
fg_light = "#ddc7a1"

# Normal ANSI (Gruvbox Material — softer, modern)
red      = "#ea6962"
green    = "#a9b665"
yellow   = "#d8a657"
blue     = "#7daea3"
purple   = "#d3869b"
cyan     = "#89b482"
orange   = "#e78a4e"

# Bright ANSI (slightly warmer pops — yellow = hero, orange = secondary)
bright_red     = "#f2594b"
bright_green   = "#b0b846"
bright_yellow  = "#e5b975"
bright_blue    = "#8fbcbb"
bright_purple  = "#e0a0b5"
bright_cyan    = "#9ac197"
bright_orange  = "#f49269"

# Single signature accent — v3 editorial. All chrome references point here.
# Everything that was bright_blue / bright_cyan / bright_purple in accents
# has been collapsed to amber. Terminals keep the full ANSI range above.
amber     = "#d8a657"
amber_dim = "#a8833f"

# ════════════════════════════════════════════
#  FONTS
# ════════════════════════════════════════════

[fonts]
mono         = "JetBrainsMono Nerd Font"
mono_display = "Maple Mono NF"
sans         = "Noto Sans"

[fonts.size]
terminal       = 12
bar            = 13
bar_clock      = 14
bar_title      = 12
notification   = 13
dunst          = 11
rofi           = 12
rofi_prompt    = 14
wofi           = 14
gtk            = 10
sddm_time      = 64
sddm_date      = 16
sddm_input     = 14
sddm_greeting  = 13
sddm_label     = 11
sddm_button    = 12
hyprlock_time   = 96
hyprlock_date   = 20

# ════════════════════════════════════════════
#  CURSOR
# ════════════════════════════════════════════

[cursor]
theme              = "Bibata-Modern-Classic"
size               = 24
kitty_shape        = "beam"
kitty_blink        = 0.5
kitty_thickness    = 1.8
kitty_trail        = 3
kitty_trail_decay  = "0.1 0.3"
alacritty_shape    = "Beam"
alacritty_blinking = "On"
alacritty_thickness = 0.15

# ════════════════════════════════════════════
#  ICONS & THEMES
# ════════════════════════════════════════════

[icons]
theme           = "Papirus-Dark"
gtk_theme       = "Breeze"
xsettings_theme = "Breeze-Dark"

# ════════════════════════════════════════════
#  WALLPAPER
# ════════════════════════════════════════════

[wallpaper]
path = "~/.config/wallpapers/wallpaper.png"

# ════════════════════════════════════════════
#  GEOMETRY — Gaps, borders, radii, padding
# ════════════════════════════════════════════

[geometry]
# Hyprland
gaps_in            = 6
gaps_out           = 16
border_size        = 1
rounding           = 6

# Terminal padding
terminal_pad_x     = 18
terminal_pad_y     = 14

# Waybar — flat edge-aligned strip, no pill shell
bar_height         = 26
bar_margin_top     = 0
bar_margin_side    = 0
bar_radius         = 0
bar_tooltip_radius = 4

# Dunst
dunst_width        = 350
dunst_height       = 100
dunst_offset       = "12x12"
dunst_radius       = 6
dunst_frame_width  = 0
dunst_padding      = 12
dunst_h_padding    = 16
dunst_gap          = 6

# Rofi — sharpen
rofi_width           = 550
rofi_padding         = 14
rofi_radius          = 10
rofi_inputbar_radius = 6
rofi_inputbar_pad_v  = 10
rofi_inputbar_pad_h  = 16
rofi_element_radius  = 4
rofi_element_pad_v   = 8
rofi_element_pad_h   = 16
rofi_element_spacing = 4
rofi_icon_size       = 0
rofi_lines           = 6

# Wofi
wofi_border        = 1
wofi_radius        = 12
wofi_input_radius  = 8
wofi_entry_radius  = 8

# Swaync — flat panel, sharp cards
swaync_cc_radius    = 8
swaync_notif_radius = 6
swaync_cc_width     = 400
swaync_notif_width  = 360

# Hyprlock
hyprlock_input_width  = 320
hyprlock_input_height = 50
hyprlock_input_border = 1
hyprlock_input_radius = 6

# SDDM
sddm_login_radius  = 8
sddm_input_radius  = 6
sddm_button_radius = 6

# ════════════════════════════════════════════
#  OPACITY & BLUR — Glass effect
# ════════════════════════════════════════════

[opacity]
terminal         = 0.82
inactive_window  = 0.92
kitty_dim        = 0.75
bar_module_bg    = 0.72        # bar background (near-opaque, no pill shell on top)
bar_module_hover = 0.12
bar_tooltip      = 1.0
rofi_bg_alpha    = "f2"        # near-opaque — editorial, no glass
rofi_glass_input = 0           # no glass wash on input
rofi_glass_sel   = 0           # no glass wash on selection
swaync_cc        = 0.92
swaync_notif     = 0.95
sddm_login_box   = 0.72
sddm_overlay     = 0.55

[blur]
hypr_size              = 14
hypr_passes            = 3
hypr_noise             = 0.01
hypr_contrast          = 1.0
hypr_brightness        = 0.88
hypr_vibrancy          = 0.25
hypr_vibrancy_darkness = 0.5
lock_passes            = 3
lock_size              = 12
lock_noise             = 0.01
lock_contrast          = 0.7
lock_brightness        = 0.5
sddm_radius            = 56

# ════════════════════════════════════════════
#  SHADOWS
# ════════════════════════════════════════════

[shadow]
hypr_range        = 22
hypr_render_power = 3
hypr_offset       = "0 4"
hypr_scale        = 0.96
hypr_alpha        = "99"

# ════════════════════════════════════════════
#  GLASS — 1px inner highlight across transparent surfaces
# ════════════════════════════════════════════

[glass]
# Top inner highlight — catches virtual light, separates layers from the blur behind.
inner_highlight_alpha = 0.08
inner_highlight_color = "fg_light"   # resolved to hex in CSS via alpha()

# ════════════════════════════════════════════
#  ANIMATIONS
# ════════════════════════════════════════════

[animations]
bar_transition      = "0.2s"
swaync_transition   = 200
sddm_clock_fade     = 800
sddm_box_fade       = 900
sddm_buttons_fade   = 1000

[animations.beziers]
liner     = [1.0, 1.0, 1.0, 1.0]
smooth    = [0.25, 1.0, 0.5, 1.0]
snappy    = [0.22, 1.0, 0.36, 1.0]    # fast-then-ease, workspace switches + window entrance
soft      = [0.25, 0.46, 0.45, 0.94]  # gentle ease-out, layer fades + window dismissal

[animations.hyprland]
windows     = [1, 3, "snappy", "slide"]
windowsIn   = [1, 3, "snappy", "slide"]
windowsOut  = [1, 2, "soft", "slide"]
windowsMove = [1, 4, "smooth", ""]
fade        = [1, 4, "liner", ""]
workspaces  = [1, 3, "snappy", "slidefade 15%"]
layers      = [1, 3, "soft", "fade"]
layersIn    = [1, 3, "soft", "fade"]
layersOut   = [1, 2, "soft", "fade"]
border      = [1, 10, "liner", ""]
borderangle = [1, 120, "liner", "loop"]

# ════════════════════════════════════════════
#  MOTION — Micro-spring primitives for CSS/rasi surfaces
#  Restrained feel: hover/press/focus respond, but you have to
#  look to see it. Scales ≤6%, durations ≤220ms.
# ════════════════════════════════════════════

[motion]
# Durations (ms)
press_ms      = 120
hover_ms      = 140
focus_ms      = 160
spring_ms     = 180
lifecycle_ms  = 220

# Easing curves (CSS cubic-bezier format)
press_curve     = "cubic-bezier(0.22, 1.0, 0.36, 1.0)"    # snappy, matches hyprland
hover_curve     = "cubic-bezier(0.22, 1.0, 0.36, 1.0)"
focus_curve     = "cubic-bezier(0.25, 0.46, 0.45, 0.94)"  # gentle ease-out
spring_curve    = "cubic-bezier(0.34, 1.35, 0.64, 1.0)"   # softened overshoot
lifecycle_curve = "cubic-bezier(0.22, 1.0, 0.36, 1.0)"

# Scale values (kept restrained)
press_scale    = 0.97
focus_scale    = 1.02
selected_scale = 1.02

# ════════════════════════════════════════════
#  WAYBAR — v3 editorial: flat strip, no pill shell.
#  [waybar.pills] and [waybar.hover] sections removed —
#  modules are plain text on the bar. Hover is color-only
#  (no background wash, no padding shift, no box-shadow).
# ════════════════════════════════════════════

# ════════════════════════════════════════════
#  LAYER EFFECTS — Per-namespace animations & shadow (Hyprland layerrules)
# ════════════════════════════════════════════

[layer_effects]
# Per-layer entrance animation style (options: slide, popin [N%], fade, noanim)
# Namespaces must be matched via Hyprland's `match:namespace` selector (newer syntax).
waybar_animation  = "slide"
rofi_animation    = "popin 80%"
swaync_cc_anim    = "slide"
swaync_notif_anim = "slide"

# ════════════════════════════════════════════
#  SWAYOSD — Volume/brightness/capslock popup
# ════════════════════════════════════════════

[swayosd]
# Popup geometry + glass styling (matches rofi aesthetic)
radius           = 8
padding_v        = 14
padding_h        = 20
icon_size        = 32
progress_height  = 6
progress_radius  = 3
bg_alpha         = 0.95
# Accent (use a color name from [colors])
accent           = "amber"

# ════════════════════════════════════════════
#  BORDER — Subtle muted gradient
# ════════════════════════════════════════════

[border]
active_colors  = ["amber"]
active_angle   = ""
inactive_alpha = "00"

# ════════════════════════════════════════════
#  ACCENTS — Per-module color assignments
#  Values reference color names from [colors]
# ════════════════════════════════════════════

[accents.bar]
# v3: amber everywhere chrome used to be bright_blue. Modules in the new
# template use @fg_dim base + @amber for clock and ACTIVE state. These
# values are kept for any downstream consumer that reads them.
workspace_active = "amber"
clock            = "amber"
cpu              = "amber"
memory           = "amber"
audio            = "amber"
network          = "amber"
media            = "amber"
notification     = "amber"

[accents.fetch]
# v3: amber for labels + accents, fg for values. Collapsed 11-way palette.
os       = "amber"
kernel   = "amber"
packages = "amber"
shell    = "amber"
uptime   = "amber"
wm       = "amber"
terminal = "amber"
cpu      = "amber"
gpu      = "amber"
memory   = "amber"
disk     = "amber"

[accents.starship]
os          = "amber"
directory   = "amber"
git_branch  = "amber"
git_status  = "fg_dim"
python      = "amber"
nodejs      = "amber"
rust        = "amber"

[accents.rofi]
selection = "amber"

[accents.wofi]
focus       = "amber"
selection   = "amber"
selected_bg = "bg2"
selected_fg = "fg_light"

[accents.swaync]
title         = "fg"            # bold fg, no hue — amber reserved for timestamps
summary       = "fg"
dnd_switch    = "amber"
close_ambient = "fg_dim"
close_hover   = "fg"            # no red in chrome — just brighten on hover
timestamp     = "amber"         # the only hue on a notification

[accents.hyprlock]
outer = "amber"          # chrome
check = "bright_green"   # semantic; stays green
fail  = "bright_red"     # semantic; stays red

[accents.btop]
highlight   = "amber"
selected    = "amber"
proc_misc   = "amber"
cpu_box     = "amber"
mem_box     = "amber"
net_box     = "amber"
proc_box    = "amber"
download    = "amber"
upload      = "fg_dim"          # direction through opacity, not hue

[accents.kitty]
url_color       = "amber"
active_tab_fg   = "bg0"
active_tab_bg   = "amber"
inactive_tab_fg = "fg_dim"
inactive_tab_bg = "bg1"

[accents.sddm]
login_button = "amber"

[accents.swayosd]
progress = "amber"
icon     = "fg"
text     = "fg"

[accents.firefox]
tab_accent   = "amber"          # bottom border on active tab
close_hover  = "fg_dim"         # hover bg on tab close — muted, no red
menu_hover   = "amber"          # menuitem:hover text color
urlbar_focus = "amber"          # focused urlbar border
urlbar_url   = "amber"          # URL text color in autocomplete dropdown

[accents.cava]
# Cava is no longer in the waybar (v3 editorial). Kept here so the standalone
# CLI cava still themes cohesively when the user runs it in a terminal.
gradient = ["amber", "amber_dim", "fg_dim"]

[accents.kde]
color_scheme = "BreezeDark"    # will be replaced with custom scheme once midnight-glass.colors ships
cursor       = "Bibata-Modern-Classic"
icons        = "Papirus-Dark"

# ════════════════════════════════════════════
#  HYPRLAND PLUGINS — hyprpm-managed eye-candy
# ════════════════════════════════════════════

[plugins.hyprexpo]
# Workspace overview grid. Trigger via `hyprctl dispatch hyprexpo:expo toggle`
# or bind a key if you want one-touch access.
enabled          = true
columns          = 3
gap_size         = 5
bg_col           = "bg0"          # color name from [colors]
workspace_method = "center current"
skip_empty       = false

[plugins.hyprtrails]
# Comet-tail behind moving windows. Pairs with spring motion.
# Disabled — upstream currently fails to build against current Hyprland release.
# Re-enable after hyprwm/hyprland-plugins ships a fix.
enabled    = false
color      = "bright_blue"
color_alpha = "aa"
bezier     = "snappy"
points     = 3
history_points = 20

[plugins.hyprfocus]
# Editorial = no pulse on focus. The amber border already marks focus.
enabled             = false
animate_floating    = true
animate_workspacechange = true
focus_animation     = "shrink"
bezier_in           = "snappy"    # must be a name from animations.beziers
bezier_out          = "soft"
flash_in_speed      = 0.4
flash_out_speed     = 4
flash_pop_in        = 0.94        # scale-in target
flash_pop_out       = 1.0

# ════════════════════════════════════════════
#  CAVA — audio visualizer (waybar strip)
# ════════════════════════════════════════════

[cava]
# v3: cava is no longer in the waybar. Kept as a standalone CLI tool.
bars            = 7
framerate       = 60
sensitivity     = 100
sleep_timer     = 5
bar_width       = 2
bar_spacing     = 1
noise_reduction = 0.77

# ════════════════════════════════════════════
#  PLYMOUTH — boot splash (sudo-deployed)
# ════════════════════════════════════════════

[plymouth]
theme_name  = "gruvbox-refined"
pulse_color = "amber"
logo_text   = "CACHYOS"
title       = "Gruvbox Refined"

# ════════════════════════════════════════════
#  SWAPPY — screenshot editor (themed config; not bound — opt-in)
# ════════════════════════════════════════════

[swappy]
save_dir  = "~/Pictures/Screenshots"
line_size = 5
text_size = 30
text_font = "JetBrainsMono Nerd Font"
line_color  = "amber"           # color name → resolved hex in template

# ════════════════════════════════════════════
#  FASTFETCH LOGO — custom ASCII art
# ════════════════════════════════════════════

[fastfetch]
logo_source  = "~/.config/fastfetch/cachyos-logo.txt"
logo_type    = "file"
logo_padding_top   = 6
logo_padding_left  = 2
logo_padding_right = 3
