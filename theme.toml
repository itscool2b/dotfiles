# ~/.config/theme.toml — Single source of truth for all visual settings
# Change values here, then run: ./theme-generate.py

[meta]
name = "Gruvbox Cream"

# ════════════════════════════════════════════
#  COLORS — Gruvbox Material base + Amber CRT chrome
# ════════════════════════════════════════════

[colors]
# ═══ Gruvbox Material bg/fg — warm dark gray (NOT black) ═══
# bg0 reads as visible warm gray even when terminal is transparent
# over a black wallpaper. Slight warm lean (r > b), zero purple.
bg0      = "#2a2724"   # warm dark gray (NOT black — visible at 80% opacity)
bg1      = "#322f2c"   # surface
bg2      = "#3a3633"   # raised
bg3      = "#45403d"   # borders / dividers
bg4      = "#504945"   # hover
gray     = "#928374"   # disabled / muted

# Foregrounds — cream with Material softening
fg       = "#d4be98"   # material fg (softer cream)
fg_mid   = "#bdae93"   # secondary
fg_dim   = "#a89984"   # tertiary
fg_light = "#ebdbb2"   # brightest (canonical fg)

# ═══ Gruvbox Material ANSI — vivid but earthy, distinct rainbow ═══
# Normal ANSI — Material palette
red      = "#ea6962"   # material red (warm clay)
green    = "#a9b665"   # material green (sage)
yellow   = "#d8a657"   # material yellow (gold)
blue     = "#7daea3"   # material blue (teal — fastfetch logo hue)
purple   = "#d3869b"   # material purple (dusty rose)
cyan     = "#89b482"   # material aqua (soft aqua)
orange   = "#e78a4e"   # material orange (pumpkin)

# Bright ANSI — slightly elevated for fetch rainbow distinction
bright_red     = "#ea6962"
bright_green   = "#a9b665"
bright_yellow  = "#d8a657"
bright_blue    = "#7daea3"   # terminal blue — fastfetch logo
bright_purple  = "#d3869b"
bright_cyan    = "#89b482"
bright_orange  = "#e78a4e"

# Faded — darker Material-derived variants for selections
faded_red      = "#a84040"
faded_green    = "#74814c"
faded_yellow   = "#a0832e"
faded_blue     = "#4a7670"
faded_purple   = "#a05971"
faded_cyan     = "#5d7e54"
faded_orange   = "#a45930"

# ═══ UI chrome hero — Gruvbox cream (no hue, classic Mac white outline) ═══
# Decoupled from bright_blue so chrome stays cream while terminal
# ANSI bright_blue is Gruvbox Material teal-blue. Referenced by
# border, rofi, wofi, swaync, hyprlock, sddm, swayosd, firefox, kde,
# plymouth, swappy — see [accents.*] below.
# Variable kept named "steel" for stability; hex = Gruvbox brightest cream.
steel    = "#ebdbb2"

# ════════════════════════════════════════════
#  FONTS
# ════════════════════════════════════════════

[fonts]
# Maple Mono NF (Regular) everywhere — terminal, UI chrome, GTK/Qt apps, Obsidian.
# Only the browser is exempt via fontconfig prgname scoping (see fontconfig template).
mono         = "Maple Mono NF"             # terminal, Obsidian, code editors
mono_display = "Maple Mono NF"             # waybar, dunst, swaync, rofi items, wofi, hyprlock
mono_fallback = "JetBrainsMono Nerd Font"
sans         = "Maple Mono NF"             # GTK / Qt / xsettings / fontconfig generic sans-serif
browser      = "Maple Mono NF Light"       # browser web content — scoped via prgname in fontconfig
# prgname values fontconfig sees via /proc/self/comm (15-char truncated).
# Google Chrome reports "chrome"; Chromium reports "chromium"; Firefox reports "firefox".
browser_prgnames = ["firefox", "chrome", "chromium"]

[fonts.size]
terminal       = 13
bar            = 12
bar_clock      = 12
bar_title      = 12
notification   = 13
dunst          = 11
rofi           = 12
rofi_prompt    = 14
wofi           = 14
gtk            = 10
sddm_time      = 64
sddm_date      = 16
sddm_input     = 14
sddm_greeting  = 13
sddm_label     = 11
sddm_button    = 12
hyprlock_time   = 96
hyprlock_date   = 20

# ════════════════════════════════════════════
#  CURSOR
# ════════════════════════════════════════════

[cursor]
theme              = "Bibata-Modern-Classic"
size               = 24
kitty_shape        = "beam"
kitty_blink        = 0.4
kitty_thickness    = 2.6
kitty_trail        = 8
kitty_trail_decay  = "0.06 0.5"
alacritty_shape    = "Beam"
alacritty_blinking = "On"
alacritty_thickness = 0.15

# ════════════════════════════════════════════
#  ICONS & THEMES
# ════════════════════════════════════════════

[icons]
theme           = "Papirus-Dark"
gtk_theme       = "Breeze"
xsettings_theme = "Breeze-Dark"

# ════════════════════════════════════════════
#  WALLPAPER
# ════════════════════════════════════════════

[wallpaper]
path = "~/.config/wallpapers/wallhaven-k9rqp7.jpg"

# ════════════════════════════════════════════
#  GEOMETRY — Gaps, borders, radii, padding
# ════════════════════════════════════════════

[geometry]
# Hyprland — Mac OS Platinum: sharper corners, heavier frames, tighter gaps
gaps_in            = 5
gaps_out           = 14
border_size        = 2
rounding           = 3

# Terminal padding — editorial breathing room
terminal_pad_x     = 36
terminal_pad_y     = 28

# Waybar — ghost strip, blends into wallpaper
bar_height         = 22
bar_margin_top     = 0
bar_margin_side    = 0
bar_radius         = 0
bar_tooltip_radius = 2

# Dunst
dunst_width        = 350
dunst_height       = 100
dunst_offset       = "12x12"
dunst_radius       = 3
dunst_frame_width  = 0
dunst_padding      = 12
dunst_h_padding    = 16
dunst_gap          = 6

# Rofi — Mac Platinum: sharper radii, heavier frame
rofi_width           = 550
rofi_padding         = 14
rofi_radius          = 4
rofi_inputbar_radius = 2
rofi_inputbar_pad_v  = 10
rofi_inputbar_pad_h  = 16
rofi_element_radius  = 2
rofi_element_pad_v   = 8
rofi_element_pad_h   = 16
rofi_element_spacing = 4
rofi_icon_size       = 22
rofi_lines           = 6

# Wofi
wofi_border        = 2
wofi_radius        = 4
wofi_input_radius  = 3
wofi_entry_radius  = 3

# Swaync — Mac Platinum: sharp cards
swaync_cc_radius    = 4
swaync_notif_radius = 3
swaync_cc_width     = 400
swaync_notif_width  = 360

# Hyprlock
hyprlock_input_width  = 320
hyprlock_input_height = 50
hyprlock_input_border = 2
hyprlock_input_radius = 2

# SDDM
sddm_login_radius  = 3
sddm_input_radius  = 3
sddm_button_radius = 3

# ════════════════════════════════════════════
#  OPACITY & BLUR — Glass effect
# ════════════════════════════════════════════

[opacity]
terminal         = 0.82
inactive_window  = 0.92
kitty_dim        = 0.6
bar_module_bg    = 0.0         # bar background — transparent, blends into wallpaper
bar_module_hover = 0.12
bar_tooltip      = 1.0
rofi_bg_alpha    = "f2"        # near-opaque — editorial, no glass
rofi_glass_input = 0           # no glass wash on input
rofi_glass_sel   = 0           # no glass wash on selection
swaync_cc        = 0.92
swaync_notif     = 0.95
sddm_login_box   = 0.72
sddm_overlay     = 0.55

[blur]
hypr_size              = 14
hypr_passes            = 3
hypr_noise             = 0.01
hypr_contrast          = 1.0
hypr_brightness        = 0.88
hypr_vibrancy          = 0.25
hypr_vibrancy_darkness = 0.5
lock_passes            = 3
lock_size              = 12
lock_noise             = 0.01
lock_contrast          = 0.7
lock_brightness        = 0.5
sddm_radius            = 56

# ════════════════════════════════════════════
#  SHADOWS
# ════════════════════════════════════════════

[shadow]
hypr_range        = 28
hypr_render_power = 4
hypr_offset       = "0 0"
hypr_scale        = 1.0
hypr_alpha        = "66"

# ════════════════════════════════════════════
#  GLASS — 1px inner highlight across transparent surfaces
# ════════════════════════════════════════════

[glass]
# Top inner highlight — catches virtual light, separates layers from the blur behind.
inner_highlight_alpha = 0.08
inner_highlight_color = "fg_light"   # resolved to hex in CSS via alpha()

# ════════════════════════════════════════════
#  ANIMATIONS
# ════════════════════════════════════════════

[animations]
# v6 Silk — Material Design 3 emphasized curves everywhere.
# Cohesive motion language: asymmetric in/out, gentle overshoot on
# entrance, decisive acceleration on exit.
bar_transition      = "0.28s"
swaync_transition   = 320
sddm_clock_fade     = 800
sddm_box_fade       = 900
sddm_buttons_fade   = 1000

[animations.beziers]
# Material Design 3 "emphasized" — the premium motion feel.
# NO overshoot / bob anywhere — everything lands exactly on target.
emphasized       = [0.2, 0.0, 0.0, 1.0]      # signature smooth standard
emphasized_decel = [0.05, 0.7, 0.1, 1.0]     # things arriving — soft landing
emphasized_accel = [0.3, 0.0, 0.8, 0.15]     # things leaving — decisive exit
liner            = [1.0, 1.0, 1.0, 1.0]      # kept for border rotation

[animations.hyprland]
# Durations in deciseconds (1 = 100ms). 4–5 = ~400–500ms is the
# sweet spot for silky without feeling laggy.
windows     = [1, 5, "emphasized_decel", "popin 80%"]
windowsIn   = [1, 5, "emphasized_decel", "popin 85%"]
windowsOut  = [1, 4, "emphasized_accel", "popin 90%"]
windowsMove = [1, 5, "emphasized",       ""]
fade        = [1, 4, "emphasized",       ""]
workspaces  = [1, 6, "emphasized",       "slidefade 20%"]
layers      = [1, 4, "emphasized_decel", "slide"]
layersIn    = [1, 4, "emphasized_decel", "slide"]
layersOut   = [1, 3, "emphasized_accel", "fade"]
border      = [1, 12, "emphasized",      ""]
borderangle = [1, 120, "liner",          "loop"]

# ════════════════════════════════════════════
#  MOTION — Micro-spring primitives for CSS/rasi surfaces
#  Restrained feel: hover/press/focus respond, but you have to
#  look to see it. Scales ≤6%, durations ≤220ms.
# ════════════════════════════════════════════

[motion]
# v6 Silk — CSS surfaces breathe with the same MD3 emphasized curves
# as Hyprland. Slightly longer durations so the motion is felt, not
# just glimpsed.
press_ms      = 160
hover_ms      = 220
focus_ms      = 260
spring_ms     = 300
lifecycle_ms  = 340

# Easing curves (CSS cubic-bezier format) — mirror the bezier set
press_curve     = "cubic-bezier(0.2, 0.0, 0.0, 1.0)"      # emphasized
hover_curve     = "cubic-bezier(0.2, 0.0, 0.0, 1.0)"      # emphasized
focus_curve     = "cubic-bezier(0.05, 0.7, 0.1, 1.0)"     # emphasized_decel
spring_curve    = "cubic-bezier(0.05, 0.7, 0.1, 1.0)"     # emphasized_decel — no bob
lifecycle_curve = "cubic-bezier(0.2, 0.0, 0.0, 1.0)"      # emphasized

# Scale values (kept restrained)
press_scale    = 0.97
focus_scale    = 1.02
selected_scale = 1.02

# ════════════════════════════════════════════
#  WAYBAR — v3 editorial: flat strip, no pill shell.
#  [waybar.pills] and [waybar.hover] sections removed —
#  modules are plain text on the bar. Hover is color-only
#  (no background wash, no padding shift, no box-shadow).
# ════════════════════════════════════════════

# ════════════════════════════════════════════
#  LAYER EFFECTS — Per-namespace animations & shadow (Hyprland layerrules)
# ════════════════════════════════════════════

[layer_effects]
# Per-layer entrance animation style (options: slide, popin [N%], fade, noanim)
# Namespaces must be matched via Hyprland's `match:namespace` selector (newer syntax).
waybar_animation  = "slide"
rofi_animation    = "slidefade 15%"
swaync_cc_anim    = "slide"
swaync_notif_anim = "slide"

# ════════════════════════════════════════════
#  SWAYOSD — Volume/brightness/capslock popup
# ════════════════════════════════════════════

[swayosd]
# Popup geometry + glass styling (matches rofi aesthetic)
radius           = 8
padding_v        = 14
padding_h        = 20
icon_size        = 32
progress_height  = 6
progress_radius  = 3
bg_alpha         = 0.95
# Accent (use a color name from [colors])
accent           = "steel"

# ════════════════════════════════════════════
#  BORDER — Subtle muted gradient
# ════════════════════════════════════════════

[border]
active_colors  = ["steel"]
active_angle   = ""
inactive_alpha = "00"

# ════════════════════════════════════════════
#  ACCENTS — Per-module color assignments
#  Values reference color names from [colors]
# ════════════════════════════════════════════

[accents.bar]
# v5 Ghost — bar dissolves into wallpaper. Single muted tone, weight-only
# contrast. No chrome accent. Semantic orange reserved for urgent only.
workspace_active = "fg_light"
workspace_urgent = "bright_orange"    # semantic: urgency
clock            = "fg_mid"
cpu              = "fg_dim"
memory           = "fg_dim"
audio            = "fg_dim"
network          = "fg_dim"
media            = "fg_dim"
notification     = "fg_mid"

[accents.fetch]
# Scattered palette — no adjacent hues touch, no visible R→O→Y→G cascade.
# Each color picked for semantic fit, not wheel position. All 7 brights
# still used; reads as identity, not as a pride flag.
os       = "bright_yellow"    # CachyOS — warm gold branding
kernel   = "bright_red"       # kernel — hot core
packages = "bright_cyan"      # pkgs — soft aqua (package boxes)
shell    = "bright_purple"    # shell — fish prompt tradition
uptime   = "bright_green"     # uptime — alive / running
wm       = "bright_blue"      # wm — Hyprland teal hero
terminal = "bright_orange"    # term — warm cursor
cpu      = "bright_red"       # cpu — compute heat (rhymes w/ kernel)
gpu      = "bright_green"     # gpu — NVIDIA green
memory   = "bright_purple"    # mem — density (rhymes w/ shell)
disk     = "bright_yellow"    # disk — storage gold (rhymes w/ os)

[accents.starship]
# v5 Rainbow — every segment a different gruvbox bright, each
# language mapped to its brand color. Directory is aqua — the classic
# gruvbox "navigational calm" tone, readable and prominent.
os          = "bright_blue"
directory   = "bright_cyan"
git_branch  = "bright_purple"
git_status  = "bright_orange"
python      = "bright_yellow"
nodejs      = "bright_green"
rust        = "bright_red"

[accents.rofi]
selection = "steel"

[accents.wofi]
focus       = "steel"
selection   = "steel"
selected_bg = "bg2"
selected_fg = "fg_light"

[accents.swaync]
title         = "fg"              # bold fg, no hue
summary       = "fg"
dnd_switch    = "steel"
close_ambient = "fg_dim"
close_hover   = "fg"              # no red in chrome
timestamp     = "steel"           # single hero

[accents.hyprlock]
outer = "steel"  # chrome hero
check = "bright_green"   # semantic
fail  = "bright_red"     # semantic

[accents.btop]
# Chrome single-hero; data gradients (cpu/temp/mem) keep canonical multi-color
# via hardcoded template refs — those are semantic data viz.
highlight   = "bright_blue"
selected    = "bright_blue"
proc_misc   = "bright_blue"
cpu_box     = "bright_blue"
mem_box     = "bright_blue"
net_box     = "bright_blue"
proc_box    = "bright_blue"
download    = "bright_blue"
upload      = "fg_dim"              # direction via opacity, not hue

[accents.kitty]
url_color       = "bright_blue"
active_tab_fg   = "bg0"
active_tab_bg   = "bright_blue"
inactive_tab_fg = "fg_dim"
inactive_tab_bg = "bg1"

[accents.sddm]
login_button = "steel"         # retained for back-compat (yellowBright in QML)
chrome       = "steel"         # primary SDDM accent — clock, greeting, focus, button bg
chrome_hover = "fg_light"      # subtle hover lift — cream, not a hue swap

[accents.swayosd]
progress = "steel"
icon     = "fg"
text     = "fg"

[accents.firefox]
tab_accent   = "steel"
close_hover  = "fg_dim"
menu_hover   = "steel"
urlbar_focus = "steel"
urlbar_url   = "steel"

[accents.cava]
# Standalone CLI only (cava not in bar). Monochromatic blue fade.
gradient = ["bright_blue", "blue", "fg_dim"]

[accents.kde]
color_scheme = "Gruvbox"       # generated to ~/.local/share/color-schemes/Gruvbox.colors
chrome       = "steel"         # KDE accent — selection, focus, decoration in Dolphin etc.
cursor       = "Bibata-Modern-Classic"
icons        = "Papirus-Dark"

# ════════════════════════════════════════════
#  HYPRLAND PLUGINS — hyprpm-managed eye-candy
# ════════════════════════════════════════════

[plugins.hyprexpo]
# Workspace overview grid. Trigger via `hyprctl dispatch hyprexpo:expo toggle`
# or bind a key if you want one-touch access.
enabled          = true
columns          = 3
gap_size         = 5
bg_col           = "bg0"          # color name from [colors]
workspace_method = "center current"
skip_empty       = false

[plugins.hyprtrails]
# Comet-tail behind moving windows. Pairs with spring motion.
# Disabled — upstream currently fails to build against current Hyprland release.
# Re-enable after hyprwm/hyprland-plugins ships a fix.
enabled    = false
color      = "steel"
color_alpha = "aa"
bezier     = "snappy"
points     = 3
history_points = 20

[plugins.hyprfocus]
# Editorial = no pulse on focus. The yellow border already marks focus.
enabled             = false
animate_floating    = true
animate_workspacechange = true
focus_animation     = "shrink"
bezier_in           = "snappy"    # must be a name from animations.beziers
bezier_out          = "soft"
flash_in_speed      = 0.4
flash_out_speed     = 4
flash_pop_in        = 0.94        # scale-in target
flash_pop_out       = 1.0

# ════════════════════════════════════════════
#  CAVA — audio visualizer (waybar strip)
# ════════════════════════════════════════════

[cava]
# v3: cava is no longer in the waybar. Kept as a standalone CLI tool.
bars            = 7
framerate       = 60
sensitivity     = 100
sleep_timer     = 5
bar_width       = 2
bar_spacing     = 1
noise_reduction = 0.77

# ════════════════════════════════════════════
#  PLYMOUTH — boot splash (sudo-deployed)
# ════════════════════════════════════════════

[plymouth]
theme_name  = "gruvbox-refined"
pulse_color = "steel"
logo_text   = "CACHYOS"
title       = "itscool2b"

# ════════════════════════════════════════════
#  SWAPPY — screenshot editor (themed config; not bound — opt-in)
# ════════════════════════════════════════════

[swappy]
save_dir  = "~/Pictures/Screenshots"
line_size = 5
text_size = 30
text_font = "JetBrainsMono Nerd Font"
line_color  = "steel"                 # color name → resolved hex in template

# ════════════════════════════════════════════
#  FASTFETCH LOGO — custom ASCII art
# ════════════════════════════════════════════

[fastfetch]
# ANSI Shadow CACHYOS block-letter logo. Solid gruvbox bright_blue
# (all color slots overridden to one hue).
logo_source        = "~/.config/fastfetch/cachyos-logo.txt"
logo_type          = "file"
logo_color_solid   = "bright_blue"
logo_padding_top   = 6
logo_padding_left  = 2
logo_padding_right = 3

# ════════════════════════════════════════════
#  JSON PATCHES — non-templated app configs
#  Each entry: target file → fields to set/merge.
#  Values prefixed with `@` resolve against theme context (e.g. @colors.fg,
#  @geometry.bar_height, @fonts.size.terminal). All other values pass through.
#  Paths starting with `~` are absolute; others are relative to ~/.config.
#  Setting a nested table replaces the whole sub-object (matches prior behavior).
# ════════════════════════════════════════════

[json_patches.vscodium]
file = "VSCodium/User/settings.json"

[json_patches.vscodium.fields]
"terminal.integrated.fontFamily" = "@fonts.mono"
"terminal.integrated.fontSize"   = "@fonts.size.terminal"
"terminal.integrated.cursorWidth" = 2

[json_patches.vscodium.fields."workbench.colorCustomizations"]
"terminal.foreground"          = "@colors.fg"
"terminal.background"          = "@colors.bg0"
"terminal.ansiBlack"           = "@colors.bg1"
"terminal.ansiBrightBlack"     = "@colors.gray"
"terminal.ansiRed"             = "@colors.red"
"terminal.ansiBrightRed"       = "@colors.bright_red"
"terminal.ansiGreen"           = "@colors.green"
"terminal.ansiBrightGreen"     = "@colors.bright_green"
"terminal.ansiYellow"          = "@colors.yellow"
"terminal.ansiBrightYellow"    = "@colors.bright_yellow"
"terminal.ansiBlue"            = "@colors.blue"
"terminal.ansiBrightBlue"      = "@colors.bright_blue"
"terminal.ansiMagenta"         = "@colors.purple"
"terminal.ansiBrightMagenta"   = "@colors.bright_purple"
"terminal.ansiCyan"            = "@colors.cyan"
"terminal.ansiBrightCyan"      = "@colors.bright_cyan"
"terminal.ansiWhite"           = "@colors.fg_dim"
"terminal.ansiBrightWhite"     = "@colors.fg"
"terminal.selectionBackground" = "@colors.fg"
"terminal.selectionForeground" = "@colors.bg0"
"terminalCursor.foreground"    = "@colors.fg"

# waybar/config.jsonc has // comments; strip before parsing.
[json_patches.waybar]
file = "waybar/config.jsonc"
strip_jsonc = true

[json_patches.waybar.fields]
"height"       = "@geometry.bar_height"
"margin-top"   = "@geometry.bar_margin_top"
"margin-left"  = "@geometry.bar_margin_side"
"margin-right" = "@geometry.bar_margin_side"

# Obsidian vault lives outside ~/.config — absolute path.
[json_patches.obsidian]
file = "~/main/.obsidian/appearance.json"

[json_patches.obsidian.fields]
interfaceFontFamily = "@fonts.mono"
textFontFamily      = "@fonts.mono"
monospaceFontFamily = "@fonts.mono"

[json_patches.swaync]
file = "swaync/config.json"

[json_patches.swaync.fields]
"control-center-width"      = "@geometry.swaync_cc_width"
"notification-window-width" = "@geometry.swaync_notif_width"
"transition-time"           = "@animations.swaync_transition"
