# ~/.config/theme.toml — Single source of truth for all visual settings
# Change values here, then run: ./theme-generate.py

[meta]
name = "Gruvbox Refined"

# ════════════════════════════════════════════
#  COLORS — Gruvbox Material palette (softer, smoother than canonical)
# ════════════════════════════════════════════

[colors]
# Backgrounds (warm dark, hard-contrast bg0 retained)
bg0      = "#1d2021"
bg1      = "#282828"
bg2      = "#32302f"
bg3      = "#3c3836"
bg4      = "#504945"
gray     = "#7c6f64"

# Foregrounds (Gruvbox Material soft cream — less yellow than canonical)
fg       = "#d4be98"
fg_dim   = "#928374"
fg_light = "#ddc7a1"

# Normal ANSI (Gruvbox Material — softer, modern)
red      = "#ea6962"
green    = "#a9b665"
yellow   = "#d8a657"
blue     = "#7daea3"
purple   = "#d3869b"
cyan     = "#89b482"
orange   = "#e78a4e"

# Bright ANSI (slightly warmer pops — yellow = hero, orange = secondary)
bright_red     = "#f2594b"
bright_green   = "#b0b846"
bright_yellow  = "#e5b975"
bright_blue    = "#8fbcbb"
bright_purple  = "#e0a0b5"
bright_cyan    = "#9ac197"
bright_orange  = "#f49269"

# ════════════════════════════════════════════
#  FONTS
# ════════════════════════════════════════════

[fonts]
mono = "JetBrainsMono Nerd Font"
sans = "Noto Sans"

[fonts.size]
terminal       = 12
bar            = 13
bar_clock      = 14
bar_title      = 12
notification   = 13
dunst          = 11
rofi           = 12
rofi_prompt    = 14
wofi           = 14
gtk            = 10
sddm_time      = 64
sddm_date      = 16
sddm_input     = 14
sddm_greeting  = 13
sddm_label     = 11
sddm_button    = 12
hyprlock_time   = 96
hyprlock_date   = 20

# ════════════════════════════════════════════
#  CURSOR
# ════════════════════════════════════════════

[cursor]
theme              = "Bibata-Modern-Classic"
size               = 24
kitty_shape        = "beam"
kitty_blink        = 0.5
kitty_thickness    = 1.8
kitty_trail        = 3
kitty_trail_decay  = "0.1 0.3"
alacritty_shape    = "Beam"
alacritty_blinking = "On"
alacritty_thickness = 0.15

# ════════════════════════════════════════════
#  ICONS & THEMES
# ════════════════════════════════════════════

[icons]
theme           = "Papirus-Dark"
gtk_theme       = "Breeze"
xsettings_theme = "Breeze-Dark"

# ════════════════════════════════════════════
#  WALLPAPER
# ════════════════════════════════════════════

[wallpaper]
path = "~/.config/wallpapers/wallpaper.png"

# ════════════════════════════════════════════
#  GEOMETRY — Gaps, borders, radii, padding
# ════════════════════════════════════════════

[geometry]
# Hyprland
gaps_in            = 6
gaps_out           = 16
border_size        = 2
rounding           = 12

# Terminal padding
terminal_pad_x     = 18
terminal_pad_y     = 14

# Waybar
bar_height         = 32
bar_margin_top     = 5
bar_margin_side    = 10
bar_radius         = 10
bar_tooltip_radius = 12

# Dunst
dunst_width        = 350
dunst_height       = 100
dunst_offset       = "12x12"
dunst_radius       = 10
dunst_frame_width  = 1
dunst_padding      = 12
dunst_h_padding    = 16
dunst_gap          = 6

# Rofi
rofi_width           = 550
rofi_padding         = 14
rofi_radius          = 24
rofi_inputbar_radius = 16
rofi_inputbar_pad_v  = 10
rofi_inputbar_pad_h  = 16
rofi_element_radius  = 16
rofi_element_pad_v   = 8
rofi_element_pad_h   = 16
rofi_element_spacing = 4
rofi_icon_size       = 24
rofi_lines           = 8

# Wofi
wofi_border        = 1
wofi_radius        = 12
wofi_input_radius  = 8
wofi_entry_radius  = 8

# Swaync
swaync_cc_radius    = 16
swaync_notif_radius = 12
swaync_cc_width     = 400
swaync_notif_width  = 360

# Hyprlock
hyprlock_input_width  = 320
hyprlock_input_height = 50
hyprlock_input_border = 2
hyprlock_input_radius = 14

# SDDM
sddm_login_radius  = 16
sddm_input_radius  = 10
sddm_button_radius = 15

# ════════════════════════════════════════════
#  OPACITY & BLUR — Glass effect
# ════════════════════════════════════════════

[opacity]
terminal         = 0.82
inactive_window  = 0.85
kitty_dim        = 0.75
bar_module_bg    = 0.25
bar_module_hover = 0.12
bar_tooltip      = 0.90
rofi_bg_alpha    = "99"
rofi_glass_input = 5
rofi_glass_sel   = 8
swaync_cc        = 0.60
swaync_notif     = 0.72
sddm_login_box   = 0.72
sddm_overlay     = 0.55

[blur]
hypr_size              = 14
hypr_passes            = 5
hypr_noise             = 0.01
hypr_contrast          = 1.0
hypr_brightness        = 0.88
hypr_vibrancy          = 0.25
hypr_vibrancy_darkness = 0.5
lock_passes            = 5
lock_size              = 12
lock_noise             = 0.01
lock_contrast          = 0.7
lock_brightness        = 0.5
sddm_radius            = 56

# ════════════════════════════════════════════
#  SHADOWS
# ════════════════════════════════════════════

[shadow]
hypr_range        = 35
hypr_render_power = 3
hypr_offset       = "0 6"
hypr_scale        = 0.96
hypr_alpha        = "dd"

# ════════════════════════════════════════════
#  ANIMATIONS
# ════════════════════════════════════════════

[animations]
bar_transition      = "0.2s"
swaync_transition   = 200
sddm_clock_fade     = 800
sddm_box_fade       = 900
sddm_buttons_fade   = 1000

[animations.beziers]
wind      = [0.05, 0.9, 0.1, 1.05]
winIn     = [0.1, 1.1, 0.1, 1.0]
winOut    = [0.3, -0.3, 0.0, 1.0]
liner     = [1.0, 1.0, 1.0, 1.0]
smooth    = [0.25, 1.0, 0.5, 1.0]
# New beziers for finer-grained motion control
overshoot = [0.34, 1.56, 0.64, 1.0]   # spring-like overshoot (unused by windows — caused a bob)
snappy    = [0.22, 1.0, 0.36, 1.0]    # fast-then-ease, workspace switches
soft      = [0.25, 0.46, 0.45, 0.94]  # gentle ease-out, layer fades
emphasize = [0.2, 0.9, 0.1, 1.0]      # ease-out-emphasized, decisive arrival, no bounce
popOut    = [0.4, 0.0, 0.7, 0.3]      # ease-in accel, clean dismissal

[animations.hyprland]
windows     = [1, 5, "emphasize", "popin 82%"]
windowsIn   = [1, 5, "emphasize", "popin 82%"]
windowsOut  = [1, 4, "popOut", "popin 88%"]
windowsMove = [1, 4, "smooth", ""]
fade        = [1, 4, "liner", ""]
workspaces  = [1, 3, "snappy", "slidefade 15%"]
layers      = [1, 3, "soft", "fade"]
layersIn    = [1, 3, "soft", "fade"]
layersOut   = [1, 2, "soft", "fade"]
border      = [1, 10, "liner", ""]
borderangle = [1, 120, "liner", "loop"]

# ════════════════════════════════════════════
#  MOTION — Micro-spring primitives for CSS/rasi surfaces
#  Restrained feel: hover/press/focus respond, but you have to
#  look to see it. Scales ≤6%, durations ≤220ms.
# ════════════════════════════════════════════

[motion]
# Durations (ms)
press_ms      = 120
hover_ms      = 140
focus_ms      = 160
spring_ms     = 180
lifecycle_ms  = 220

# Easing curves (CSS cubic-bezier format)
press_curve     = "cubic-bezier(0.22, 1.0, 0.36, 1.0)"    # snappy, matches hyprland
hover_curve     = "cubic-bezier(0.22, 1.0, 0.36, 1.0)"
focus_curve     = "cubic-bezier(0.25, 0.46, 0.45, 0.94)"  # gentle ease-out
spring_curve    = "cubic-bezier(0.34, 1.35, 0.64, 1.0)"   # softened overshoot
lifecycle_curve = "cubic-bezier(0.22, 1.0, 0.36, 1.0)"

# Scale values (kept restrained)
press_scale    = 0.97
focus_scale    = 1.02
selected_scale = 1.02

# ════════════════════════════════════════════
#  WAYBAR — Pill groups, hover, shadow tunables
# ════════════════════════════════════════════

[waybar.pills]
# Each "group" is a wrapper div around a cluster of modules.
# Background alpha + radius for the group pill.
group_bg_alpha   = 0.35      # background transparency for each pill
group_radius     = 10        # corner radius of each pill
group_padding_v  = 2         # vertical padding inside pill
group_padding_h  = 6         # horizontal padding inside pill
group_margin     = 4         # spacing between adjacent pills
shadow_alpha     = 0.22      # soft drop-shadow under each pill
shadow_offset_y  = 2         # shadow y-offset in px
shadow_blur      = 8         # shadow blur radius in px

[waybar.hover]
# Hover feedback on individual modules inside a pill.
duration         = "0.18s"
bg_alpha         = 0.10      # subtle warm wash on hover
radius           = 6

# ════════════════════════════════════════════
#  LAYER EFFECTS — Per-namespace animations & shadow (Hyprland layerrules)
# ════════════════════════════════════════════

[layer_effects]
# Per-layer entrance animation style (options: slide, popin [N%], fade, noanim)
# Namespaces must be matched via Hyprland's `match:namespace` selector (newer syntax).
waybar_animation  = "slide"
rofi_animation    = "popin 80%"
swaync_cc_anim    = "slide"
swaync_notif_anim = "slide"

# ════════════════════════════════════════════
#  SWAYOSD — Volume/brightness/capslock popup
# ════════════════════════════════════════════

[swayosd]
# Popup geometry + glass styling (matches rofi aesthetic)
radius           = 18
padding_v        = 14
padding_h        = 20
icon_size        = 32
progress_height  = 6
progress_radius  = 3
bg_alpha         = 0.85
# Accent (use a color name from [colors])
accent           = "bright_blue"

# ════════════════════════════════════════════
#  BORDER — Subtle muted gradient
# ════════════════════════════════════════════

[border]
active_colors  = ["bright_blue", "bright_cyan"]
active_angle   = "45deg"
inactive_alpha = "00"

# ════════════════════════════════════════════
#  ACCENTS — Per-module color assignments
#  Values reference color names from [colors]
# ════════════════════════════════════════════

[accents.bar]
workspace_active = "bright_blue"
clock            = "fg"
cpu              = "bright_blue"
memory           = "bright_purple"
audio            = "bright_cyan"
network          = "bright_blue"
media            = "bright_green"
notification     = "bright_cyan"

[accents.fetch]
os       = "bright_blue"
kernel   = "bright_cyan"
packages = "bright_blue"
shell    = "bright_green"
uptime   = "bright_yellow"
wm       = "bright_purple"
terminal = "bright_blue"
cpu      = "bright_green"
gpu      = "bright_orange"
memory   = "bright_yellow"
disk     = "bright_cyan"

[accents.starship]
os          = "yellow"
directory   = "bright_blue"
git_branch  = "bright_cyan"
git_status  = "fg_dim"
python      = "bright_blue"
nodejs      = "bright_green"
rust        = "bright_cyan"

[accents.rofi]
selection = "bright_blue"

[accents.wofi]
focus       = "bright_blue"
selection   = "bright_blue"
selected_bg = "bg2"
selected_fg = "fg_light"

[accents.swaync]
title         = "bright_blue"   # was hardcoded @yellow
summary       = "bright_blue"   # was hardcoded @yellow
dnd_switch    = "bright_blue"   # was hardcoded @orange (no red/orange in chrome)
close_ambient = "fg_dim"        # ambient close button; red only on hover
close_hover   = "bright_red"

[accents.hyprlock]
outer = "bright_blue"    # was hardcoded colors.yellow
check = "bright_green"   # semantic; stays green
fail  = "bright_red"     # semantic; stays red

[accents.btop]
highlight   = "bright_blue"
selected    = "bright_blue"
proc_misc   = "bright_blue"
cpu_box     = "bright_cyan"
mem_box     = "bright_blue"
net_box     = "bright_purple"
proc_box    = "bright_blue"
download    = "bright_blue"
upload      = "bright_purple"

[accents.kitty]
url_color       = "bright_blue"
active_tab_fg   = "bg0"
active_tab_bg   = "bright_blue"
inactive_tab_fg = "fg_dim"
inactive_tab_bg = "bg1"

[accents.sddm]
login_button = "bright_blue"

[accents.swayosd]
progress = "bright_blue"
icon     = "fg"
text     = "fg"

# ════════════════════════════════════════════
#  FASTFETCH LOGO — custom ASCII art
# ════════════════════════════════════════════

[fastfetch]
logo_source  = "~/.config/fastfetch/cachyos-logo.txt"
logo_type    = "file"
logo_padding_top   = 6
logo_padding_left  = 2
logo_padding_right = 3
