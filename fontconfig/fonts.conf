<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<!-- Generated from theme.toml — do not edit directly -->
<fontconfig>

  <!-- Subpixel antialiasing (LCD/OLED) -->
  <match target="font">
    <edit mode="assign" name="antialias"><bool>true</bool></edit>
    <edit mode="assign" name="hinting"><bool>true</bool></edit>
    <edit mode="assign" name="hintstyle"><const>hintslight</const></edit>
    <edit mode="assign" name="rgba"><const>rgb</const></edit>
    <edit mode="assign" name="lcdfilter"><const>lcddefault</const></edit>
    <edit mode="assign" name="autohint"><bool>false</bool></edit>
  </match>

  <!-- Browser exemption: keep web content off the global rice font.
       These run BEFORE the generic aliases so the strong assign overrides the
       weak prepend. prgname is set by fontconfig from /proc/self/comm — Firefox
       reports "firefox", Google Chrome reports "chrome", Chromium reports
       "chromium". Covers both generic (sans-serif/serif) requests and explicit
       web families that web pages commonly specify. -->
  <match target="pattern">
    <test name="prgname"><string>firefox</string></test>
    <test qual="any" name="family"><string>sans-serif</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Maple Mono NF Light</string></edit>
  </match>
  <match target="pattern">
    <test name="prgname"><string>firefox</string></test>
    <test qual="any" name="family"><string>serif</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Maple Mono NF Light</string></edit>
  </match>
  <match target="pattern">
    <test name="prgname"><string>firefox</string></test>
    <test qual="any" name="family"><string>Helvetica</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Maple Mono NF Light</string></edit>
  </match>
  <match target="pattern">
    <test name="prgname"><string>firefox</string></test>
    <test qual="any" name="family"><string>Arial</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Maple Mono NF Light</string></edit>
  </match>
  <match target="pattern">
    <test name="prgname"><string>firefox</string></test>
    <test qual="any" name="family"><string>Segoe UI</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Maple Mono NF Light</string></edit>
  </match>
  <match target="pattern">
    <test name="prgname"><string>firefox</string></test>
    <test qual="any" name="family"><string>Roboto</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Maple Mono NF Light</string></edit>
  </match>
  <match target="pattern">
    <test name="prgname"><string>firefox</string></test>
    <test qual="any" name="family"><string>Cantarell</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Maple Mono NF Light</string></edit>
  </match>
  <match target="pattern">
    <test name="prgname"><string>chrome</string></test>
    <test qual="any" name="family"><string>sans-serif</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Maple Mono NF Light</string></edit>
  </match>
  <match target="pattern">
    <test name="prgname"><string>chrome</string></test>
    <test qual="any" name="family"><string>serif</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Maple Mono NF Light</string></edit>
  </match>
  <match target="pattern">
    <test name="prgname"><string>chrome</string></test>
    <test qual="any" name="family"><string>Helvetica</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Maple Mono NF Light</string></edit>
  </match>
  <match target="pattern">
    <test name="prgname"><string>chrome</string></test>
    <test qual="any" name="family"><string>Arial</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Maple Mono NF Light</string></edit>
  </match>
  <match target="pattern">
    <test name="prgname"><string>chrome</string></test>
    <test qual="any" name="family"><string>Segoe UI</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Maple Mono NF Light</string></edit>
  </match>
  <match target="pattern">
    <test name="prgname"><string>chrome</string></test>
    <test qual="any" name="family"><string>Roboto</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Maple Mono NF Light</string></edit>
  </match>
  <match target="pattern">
    <test name="prgname"><string>chrome</string></test>
    <test qual="any" name="family"><string>Cantarell</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Maple Mono NF Light</string></edit>
  </match>
  <match target="pattern">
    <test name="prgname"><string>chromium</string></test>
    <test qual="any" name="family"><string>sans-serif</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Maple Mono NF Light</string></edit>
  </match>
  <match target="pattern">
    <test name="prgname"><string>chromium</string></test>
    <test qual="any" name="family"><string>serif</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Maple Mono NF Light</string></edit>
  </match>
  <match target="pattern">
    <test name="prgname"><string>chromium</string></test>
    <test qual="any" name="family"><string>Helvetica</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Maple Mono NF Light</string></edit>
  </match>
  <match target="pattern">
    <test name="prgname"><string>chromium</string></test>
    <test qual="any" name="family"><string>Arial</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Maple Mono NF Light</string></edit>
  </match>
  <match target="pattern">
    <test name="prgname"><string>chromium</string></test>
    <test qual="any" name="family"><string>Segoe UI</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Maple Mono NF Light</string></edit>
  </match>
  <match target="pattern">
    <test name="prgname"><string>chromium</string></test>
    <test qual="any" name="family"><string>Roboto</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Maple Mono NF Light</string></edit>
  </match>
  <match target="pattern">
    <test name="prgname"><string>chromium</string></test>
    <test qual="any" name="family"><string>Cantarell</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Maple Mono NF Light</string></edit>
  </match>

  <!-- Preferred generic families -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Maple Mono NF</family>
      <family>Noto Sans</family>
      <family>DejaVu Sans</family>
    </prefer>
  </alias>

  <alias>
    <family>monospace</family>
    <prefer>
      <family>Maple Mono NF</family>
      <family>JetBrainsMono Nerd Font</family>
      <family>DejaVu Sans Mono</family>
    </prefer>
  </alias>

  <alias>
    <family>serif</family>
    <prefer>
      <family>Maple Mono NF</family>
      <family>Noto Serif</family>
      <family>DejaVu Serif</family>
    </prefer>
  </alias>

  <!-- Emoji fallback so the bar glyphs render consistently -->
  <alias>
    <family>emoji</family>
    <prefer>
      <family>Noto Color Emoji</family>
      <family>Twemoji</family>
    </prefer>
  </alias>

  <!-- Force common UI font families to the rice font (Chrome chrome, GTK apps, generic sites) -->
  <match target="pattern">
    <test name="family" qual="any"><string>Helvetica</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Maple Mono NF</string></edit>
  </match>
  <match target="pattern">
    <test name="family" qual="any"><string>Arial</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Maple Mono NF</string></edit>
  </match>
  <match target="pattern">
    <test name="family" qual="any"><string>Segoe UI</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Maple Mono NF</string></edit>
  </match>
  <match target="pattern">
    <test name="family" qual="any"><string>Roboto</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Maple Mono NF</string></edit>
  </match>
  <match target="pattern">
    <test name="family" qual="any"><string>Cantarell</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Maple Mono NF</string></edit>
  </match>

</fontconfig>
