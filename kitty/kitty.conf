# ━━━ Kitty — Gruvbox Blue ━━━

font_family      Maple Mono NF
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0
font_features    JetBrainsMonoNF +liga +calt

# Cursor
cursor                #fabd2f
cursor_text_color     #282828
cursor_shape          beam
cursor_blink_interval 0.5
cursor_beam_thickness 1.8
cursor_trail          3
cursor_trail_decay    0.1 0.3

# Window
window_padding_width    14 18
background_opacity      0.82
background_blur         1
dim_opacity             0.75
confirm_os_window_close 0
hide_window_decorations yes

# Bell
enable_audio_bell no

# Scrollback
scrollback_lines 10000

# ━━━ Gruvbox Blue Colors ━━━

foreground #ebdbb2
background #282828

# Black
color0  #32302f
color8  #928374

# Red
color1  #cc241d
color9  #fb4934

# Green
color2  #98971a
color10 #b8bb26

# Yellow
color3  #d79921
color11 #fabd2f

# Blue
color4  #458588
color12 #83a598

# Magenta
color5  #b16286
color13 #d3869b

# Cyan
color6  #689d6a
color14 #8ec07c

# White
color7  #a89984
color15 #ebdbb2

# Selection
selection_foreground #282828
selection_background #ebdbb2

# URL
url_color #83a598
url_style curly

# Tab bar
tab_bar_style           powerline
tab_powerline_style     angled
tab_bar_min_tabs        1
tab_bar_edge            top
active_tab_foreground   #282828
active_tab_background   #83a598
active_tab_font_style   bold
inactive_tab_foreground #a89984
inactive_tab_background #32302f
