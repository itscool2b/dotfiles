# ━━━ Kitty — Glass Noir ━━━

font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0
font_features    JetBrainsMonoNF +liga +calt

# Cursor
cursor_shape          beam
cursor_blink_interval 0.5
cursor_beam_thickness 1.8
cursor_trail          3
cursor_trail_decay    0.1 0.3

# Window
window_padding_width    14 18
background_opacity      0.85
background_blur         1
dim_opacity             0.8
confirm_os_window_close 0
hide_window_decorations yes

# Bell
enable_audio_bell no

# Scrollback
scrollback_lines 10000

# ━━━ Glass Noir Colors ━━━

foreground #e8e8e8
background #181818

# Black
color0  #212121
color8  #686868

# Red
color1  #7d4d4d
color9  #b08080

# Green
color2  #4d7d4d
color10 #80b080

# Yellow
color3  #7d7d4d
color11 #b0b080

# Blue
color4  #4d6580
color12 #80a0b8

# Magenta
color5  #4d6d80
color13 #80a8b8

# Cyan
color6  #4d807d
color14 #80b8a8

# White
color7  #808080
color15 #e8e8e8

# Selection
selection_foreground #181818
selection_background #e8e8e8

# URL
url_color #80a0b8
url_style curly

# Tab bar
tab_bar_style           powerline
tab_powerline_style     angled
tab_bar_min_tabs        1
tab_bar_edge            top
active_tab_foreground   #181818
active_tab_background   #7d7d4d
active_tab_font_style   bold
inactive_tab_foreground #808080
inactive_tab_background #212121
