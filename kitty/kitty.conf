# ━━━ Kitty — Gruvbox Cream ━━━

font_family      Maple Mono NF
bold_font        Maple Mono NF Bold
italic_font      Maple Mono NF Italic
bold_italic_font Maple Mono NF Bold Italic
font_size        13.0
font_features    MapleMonoNF-Regular +liga +calt +ss01 +ss02 +ss03 +cv01 +cv02
font_features    MapleMonoNF-Bold +liga +calt +ss01 +ss02 +ss03 +cv01 +cv02
font_features    MapleMonoNF-Italic +liga +calt +ss01 +ss02 +ss03 +cv01 +cv02
font_features    MapleMonoNF-BoldItalic +liga +calt +ss01 +ss02 +ss03 +cv01 +cv02
modify_font      cell_height 112%
modify_font      baseline 2

# Cursor
cursor                #d8a657
cursor_text_color     #2a2724
cursor_shape          beam
cursor_blink_interval 0.4
cursor_beam_thickness 2.6
cursor_trail          8
cursor_trail_decay    0.06 0.5

# Window — deep glass + heavy blur
window_padding_width    28 36
background_opacity      0.82
background_blur         48
background_tint         0.2
background_tint_gaps    -20
dim_opacity             0.6
confirm_os_window_close 0
hide_window_decorations yes

# Subtle inner edge — lifts terminal off the wallpaper blur
window_margin_width     0
single_window_margin_width -1
placement_strategy      center

# Bell
enable_audio_bell no

# Scrollback
scrollback_lines 10000

# ━━━ Gruvbox Cream Colors ━━━

foreground #d4be98
background #2a2724

# Black
color0  #322f2c
color8  #928374

# Red
color1  #ea6962
color9  #ea6962

# Green
color2  #a9b665
color10 #a9b665

# Yellow
color3  #d8a657
color11 #d8a657

# Blue
color4  #7daea3
color12 #7daea3

# Magenta
color5  #d3869b
color13 #d3869b

# Cyan
color6  #89b482
color14 #89b482

# White
color7  #a89984
color15 #d4be98

# Selection
selection_foreground #2a2724
selection_background #d4be98

# URL
url_color #7daea3
url_style curly

# Tab bar — sexy powerline with fade
tab_bar_style            powerline
tab_powerline_style      slanted
tab_bar_min_tabs         2
tab_bar_edge             top
tab_bar_align            center
tab_bar_margin_width     6
tab_bar_margin_height    4 0
tab_separator            " ┇ "
tab_fade                 0.25 0.5 0.75 1
tab_title_template       "{fmt.fg._89b482}{index}{fmt.fg.default} {title[:30]}"
active_tab_foreground    #2a2724
active_tab_background    #7daea3
active_tab_font_style    bold
inactive_tab_foreground  #a89984
inactive_tab_background  #322f2c
inactive_tab_font_style  normal
