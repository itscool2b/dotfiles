# ━━━ Kitty — Midnight Glass ━━━

font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0
font_features    JetBrainsMonoNF +liga +calt

# Cursor
cursor_shape          beam
cursor_blink_interval 0.5
cursor_beam_thickness 1.8
cursor_trail          3
cursor_trail_decay    0.1 0.3

# Window
window_padding_width    14 18
background_opacity      0.82
background_blur         1
dim_opacity             0.75
confirm_os_window_close 0
hide_window_decorations yes

# Bell
enable_audio_bell no

# Scrollback
scrollback_lines 10000

# ━━━ Midnight Glass Colors ━━━

foreground #c9d1d9
background #22272e

# Black
color0  #2c323b
color8  #768390

# Red
color1  #c0526a
color9  #ff7b72

# Green
color2  #56b66a
color10 #7ee787

# Yellow
color3  #c49a3a
color11 #d29922

# Blue
color4  #4a8fd1
color12 #6b8fb8

# Magenta
color5  #8258d8
color13 #a371f7

# Cyan
color6  #2eadb6
color14 #8aa8c8

# White
color7  #8b949e
color15 #c9d1d9

# Selection
selection_foreground #22272e
selection_background #c9d1d9

# URL
url_color #6b8fb8
url_style curly

# Tab bar
tab_bar_style           powerline
tab_powerline_style     angled
tab_bar_min_tabs        1
tab_bar_edge            top
active_tab_foreground   #22272e
active_tab_background   #c49a3a
active_tab_font_style   bold
inactive_tab_foreground #8b949e
inactive_tab_background #2c323b
