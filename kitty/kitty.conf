# ━━━ Kitty — Quiet Editorial ━━━

font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0
font_features    JetBrainsMonoNF +liga +calt

# Cursor
cursor                #d8a657
cursor_text_color     #1d2021
cursor_shape          beam
cursor_blink_interval 0.5
cursor_beam_thickness 1.8
cursor_trail          3
cursor_trail_decay    0.1 0.3

# Window
window_padding_width    14 18
background_opacity      0.82
background_blur         1
dim_opacity             0.75
confirm_os_window_close 0
hide_window_decorations yes

# Bell
enable_audio_bell no

# Scrollback
scrollback_lines 10000

# ━━━ Quiet Editorial Colors ━━━

foreground #d4be98
background #1d2021

# Black
color0  #282828
color8  #7c6f64

# Red
color1  #ea6962
color9  #f2594b

# Green
color2  #a9b665
color10 #b0b846

# Yellow
color3  #d8a657
color11 #e5b975

# Blue
color4  #7daea3
color12 #8fbcbb

# Magenta
color5  #d3869b
color13 #e0a0b5

# Cyan
color6  #89b482
color14 #9ac197

# White
color7  #928374
color15 #d4be98

# Selection
selection_foreground #1d2021
selection_background #d4be98

# URL
url_color #d8a657
url_style curly

# Tab bar
tab_bar_style           powerline
tab_powerline_style     angled
tab_bar_min_tabs        1
tab_bar_edge            top
active_tab_foreground   #1d2021
active_tab_background   #d8a657
active_tab_font_style   bold
inactive_tab_foreground #928374
inactive_tab_background #282828
