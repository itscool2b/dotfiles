# ━━━ Kitty — Gruvbox Dark ━━━

font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# Cursor
cursor_shape     beam
cursor_blink_interval 0.5

# Window
window_padding_width 12
background_opacity 0.92
confirm_os_window_close 0

# Bell
enable_audio_bell no

# Scrollback
scrollback_lines 10000

# ━━━ Gruvbox Dark Colors ━━━

foreground #ebdbb2
background #1d2021

# Black
color0  #282828
color8  #928374

# Red
color1  #cc241d
color9  #fb4934

# Green
color2  #98971a
color10 #b8bb26

# Yellow
color3  #d79921
color11 #fabd2f

# Blue
color4  #458588
color12 #83a598

# Magenta
color5  #b16286
color13 #d3869b

# Cyan
color6  #689d6a
color14 #8ec07c

# White
color7  #a89984
color15 #ebdbb2

# Selection
selection_foreground #1d2021
selection_background #ebdbb2

# URL
url_color #83a598
url_style curly

# Tab bar
tab_bar_style powerline
active_tab_foreground   #1d2021
active_tab_background   #b8bb26
inactive_tab_foreground #a89984
inactive_tab_background #3c3836
