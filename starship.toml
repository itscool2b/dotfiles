# ━━━ Gruvbox Refined Starship Prompt ━━━

format = """
$os\
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$fill\
$cmd_duration\
$time\
$line_break\
$character"""

palette = "gruvbox_dark"

[palettes.gruvbox_dark]
bg0 = "#1d2021"
bg1 = "#282828"
bg2 = "#32302f"
bg3 = "#3c3836"
fg = "#d4be98"
fg_dim = "#928374"
red = "#f2594b"
green = "#b0b846"
yellow = "#e5b975"
blue = "#8fbcbb"
purple = "#e0a0b5"
aqua = "#9ac197"
orange = "#f49269"

[os]
format = "[$symbol ](bold fg:#d8a657)"
disabled = false

[os.symbols]
Arch = "󰣇"

[directory]
format = "[$path]($style) "
style = "bold fg:#8fbcbb"
truncation_length = 3
truncate_to_repo = true

[git_branch]
format = "[$symbol$branch]($style) "
style = "fg:#9ac197"
symbol = " "

[git_status]
format = "[$all_status$ahead_behind]($style)"
style = "fg:#928374"

[python]
format = "[ $version( $virtualenv)]($style) "
style = "fg:#8fbcbb"
symbol = " "

[nodejs]
format = "[󰎙 $version]($style) "
style = "fg:#b0b846"

[rust]
format = "[󱘗 $version]($style) "
style = "fg:#9ac197"

[cmd_duration]
format = "[ $duration]($style) "
style = "fg:#928374"
min_time = 2_000

[time]
format = "[ $time]($style)"
style = "fg:#3c3836"
disabled = false

[fill]
symbol = " "

[line_break]
disabled = false

[character]
success_symbol = "[❯](bold fg:#b0b846)"
error_symbol = "[❯](bold fg:#f2594b)"
