# ━━━ Glass Noir Starship Prompt ━━━

format = """
$os\
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$fill\
$cmd_duration\
$time\
$line_break\
$character"""

palette = "gruvbox_dark"

[palettes.gruvbox_dark]
bg0 = "#181818"
bg1 = "#212121"
bg2 = "#2c2c2c"
bg3 = "#3a3a3a"
fg = "#e8e8e8"
fg_dim = "#808080"
red = "#b08080"
green = "#80b080"
yellow = "#b0b080"
blue = "#80a0b8"
purple = "#80a8b8"
aqua = "#80b8a8"
orange = "#b8a080"

[os]
format = "[$symbol ](bold fg:#7d7d4d)"
disabled = false

[os.symbols]
Arch = "󰣇"

[directory]
format = "[$path]($style) "
style = "bold fg:#80a0b8"
truncation_length = 3
truncate_to_repo = true

[git_branch]
format = "[$symbol$branch]($style) "
style = "fg:#80b080"
symbol = " "

[git_status]
format = "[$all_status$ahead_behind]($style)"
style = "fg:#b08080"

[python]
format = "[ $version( $virtualenv)]($style) "
style = "fg:#80a0b8"
symbol = " "

[nodejs]
format = "[󰎙 $version]($style) "
style = "fg:#80b080"

[rust]
format = "[󱘗 $version]($style) "
style = "fg:#b8a080"

[cmd_duration]
format = "[ $duration]($style) "
style = "fg:#808080"
min_time = 2_000

[time]
format = "[ $time]($style)"
style = "fg:#3a3a3a"
disabled = false

[fill]
symbol = " "

[line_break]
disabled = false

[character]
success_symbol = "[❯](bold fg:#80b080)"
error_symbol = "[❯](bold fg:#b08080)"
