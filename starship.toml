# ━━━ Gruvbox Glass Starship Prompt ━━━

format = """
$os\
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$fill\
$cmd_duration\
$time\
$line_break\
$character"""

palette = "gruvbox_dark"

[palettes.gruvbox_dark]
bg0 = "#1d2021"
bg1 = "#282828"
bg2 = "#3c3836"
bg3 = "#504945"
fg = "#ebdbb2"
fg_dim = "#a89984"
red = "#fb4934"
green = "#b8bb26"
yellow = "#fabd2f"
blue = "#83a598"
purple = "#d3869b"
aqua = "#8ec07c"
orange = "#fe8019"

[os]
format = "[$symbol ](bold fg:#d79921)"
disabled = false

[os.symbols]
Arch = "󰣇"

[directory]
format = "[$path]($style) "
style = "bold fg:#83a598"
truncation_length = 3
truncate_to_repo = true

[git_branch]
format = "[$symbol$branch]($style) "
style = "fg:#b8bb26"
symbol = " "

[git_status]
format = "[$all_status$ahead_behind]($style)"
style = "fg:#fb4934"

[python]
format = "[ $version( $virtualenv)]($style) "
style = "fg:#83a598"
symbol = " "

[nodejs]
format = "[󰎙 $version]($style) "
style = "fg:#b8bb26"

[rust]
format = "[󱘗 $version]($style) "
style = "fg:#fe8019"

[cmd_duration]
format = "[ $duration]($style) "
style = "fg:#a89984"
min_time = 2_000

[time]
format = "[ $time]($style)"
style = "fg:#504945"
disabled = false

[fill]
symbol = " "

[line_break]
disabled = false

[character]
success_symbol = "[❯](bold fg:#b8bb26)"
error_symbol = "[❯](bold fg:#fb4934)"
