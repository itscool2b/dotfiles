# ━━━ Midnight Glass Starship Prompt ━━━

format = """
$os\
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$fill\
$cmd_duration\
$time\
$line_break\
$character"""

palette = "gruvbox_dark"

[palettes.gruvbox_dark]
bg0 = "#22272e"
bg1 = "#2c323b"
bg2 = "#363d48"
bg3 = "#424a56"
fg = "#c9d1d9"
fg_dim = "#8b949e"
red = "#ff7b72"
green = "#7ee787"
yellow = "#d29922"
blue = "#6b8fb8"
purple = "#a371f7"
aqua = "#8aa8c8"
orange = "#f0883e"

[os]
format = "[$symbol ](bold fg:#c49a3a)"
disabled = false

[os.symbols]
Arch = "󰣇"

[directory]
format = "[$path]($style) "
style = "bold fg:#6b8fb8"
truncation_length = 3
truncate_to_repo = true

[git_branch]
format = "[$symbol$branch]($style) "
style = "fg:#8aa8c8"
symbol = " "

[git_status]
format = "[$all_status$ahead_behind]($style)"
style = "fg:#8b949e"

[python]
format = "[ $version( $virtualenv)]($style) "
style = "fg:#6b8fb8"
symbol = " "

[nodejs]
format = "[󰎙 $version]($style) "
style = "fg:#8aa8c8"

[rust]
format = "[󱘗 $version]($style) "
style = "fg:#6b8fb8"

[cmd_duration]
format = "[ $duration]($style) "
style = "fg:#8b949e"
min_time = 2_000

[time]
format = "[ $time]($style)"
style = "fg:#424a56"
disabled = false

[fill]
symbol = " "

[line_break]
disabled = false

[character]
success_symbol = "[❯](bold fg:#7ee787)"
error_symbol = "[❯](bold fg:#ff7b72)"
