# ━━━ Gruvbox Cream Starship Prompt ━━━

format = """
$os\
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$fill\
$cmd_duration\
$time\
$line_break\
$character"""

palette = "gruvbox_dark"

[palettes.gruvbox_dark]
bg0 = "#2a2724"
bg1 = "#322f2c"
bg2 = "#3a3633"
bg3 = "#45403d"
fg = "#d4be98"
fg_dim = "#a89984"
red = "#ea6962"
green = "#a9b665"
yellow = "#d8a657"
blue = "#7daea3"
purple = "#d3869b"
aqua = "#89b482"
orange = "#e78a4e"

[os]
format = "[$symbol ](bold fg:#7daea3)"
disabled = false

[os.symbols]
Arch = "󰣇"

[directory]
format = "[$path]($style) "
style = "bold fg:#89b482"
truncation_length = 3
truncate_to_repo = true

[git_branch]
format = "[$symbol$branch]($style) "
style = "fg:#d3869b"
symbol = " "

[git_status]
format = "[$all_status$ahead_behind]($style)"
style = "fg:#e78a4e"

[python]
format = "[ $version( $virtualenv)]($style) "
style = "fg:#d8a657"
symbol = " "

[nodejs]
format = "[󰎙 $version]($style) "
style = "fg:#a9b665"

[rust]
format = "[󱘗 $version]($style) "
style = "fg:#ea6962"

[cmd_duration]
format = "[ $duration]($style) "
style = "fg:#a89984"
min_time = 2_000

[time]
format = "[ $time]($style)"
style = "fg:#45403d"
disabled = false

[fill]
symbol = " "

[line_break]
disabled = false

[character]
success_symbol = "[❯](bold fg:#a9b665)"
error_symbol = "[❯](bold fg:#ea6962)"
